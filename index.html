<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Racer - Optimized</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 12px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #hud .stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        #hud .stat .label {
            font-weight: 400;
            opacity: 0.5;
            font-size: 12px;
            text-transform: uppercase;
        }
        #hud .stat .value {
            font-size: 20px;
            min-width: 50px;
            text-align: center;
        }
        #hud .stat .value.speed {
            color: #4fc3f7;
        }
        #hud .stat .value.dist {
            color: #81c784;
        }
        #hud .stat .value.turbo {
            color: #ffb74d;
        }
        #hud .stat .value.turbo.active {
            color: #ff6f00;
            text-shadow: 0 0 20px #ff6f00, 0 0 40px #ff6f00;
            animation: pulse 0.3s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.15);
            }
        }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            opacity: 0.4;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
        }
        #crosshair::before {
            width: 2px;
            height: 18px;
            top: -9px;
            left: -1px;
        }
        #crosshair::after {
            width: 18px;
            height: 2px;
            top: -1px;
            left: -9px;
        }
        #instructions {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #instructions span {
            display: inline-block;
            margin: 0 8px;
        }
        #instructions .key {
            color: #fff;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #ramp-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
            font-size: 40px;
            font-weight: 800;
            color: #ffab00;
            text-shadow: 0 0 30px rgba(255, 171, 0, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #ramp-indicator.show {
            opacity: 1;
            animation: rampPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes rampPulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }
        @media (max-width: 700px) {
            #hud {
                bottom: 20px;
                padding: 8px 14px;
                gap: 16px;
                font-size: 13px;
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 30px;
                width: 92%;
            }
            #hud .stat .value {
                font-size: 16px;
                min-width: 35px;
            }
            #instructions {
                bottom: 80px;
                font-size: 10px;
                padding: 4px 12px;
                width: 92%;
            }
            #instructions span {
                margin: 0 4px;
            }
            #crosshair {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat"><span class="label">Speed</span><span class="value speed" id="speedDisplay">0</span></div>
        <div class="stat"><span class="label">Dist</span><span class="value dist" id="distDisplay">0</span></div>
        <div class="stat"><span class="label">Turbo</span><span class="value turbo" id="turboDisplay">●</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="ramp-indicator">⬆ JUMP</div>
    <div id="instructions">
        <span>🖱 <span class="key">Move</span> steer</span>
        <span>🖱 <span class="key">Left Click</span> Turbo</span>
        <span>🖱 <span class="key">Right Click</span> Jump</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ─── DOM refs ───────────────────────────────────────────────
        const speedDisplay = document.getElementById('speedDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const turboDisplay = document.getElementById('turboDisplay');
        const rampIndicator = document.getElementById('ramp-indicator');

        // ─── Scene setup ──────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1a);
        scene.fog = new THREE.Fog(0x0a0e1a, 40, 100);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 150);
        camera.position.set(0, 2.0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // performance
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0001;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.prepend(renderer.domElement);

        // ─── Lights ────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x223355, 0.4);
        scene.add(ambient);

        const moon = new THREE.DirectionalLight(0x88aaff, 0.5);
        moon.position.set(-20, 40, 30);
        scene.add(moon);

        const glow = new THREE.PointLight(0xff6622, 0.6, 60);
        glow.position.set(0, 8, 0);
        scene.add(glow);

        // ─── Road path (more turns) ──────────────────────────────
        function generatePath() {
            const pts = [];
            const total = 250;
            const length = 100;
            const turns = 6;
            for (let i = 0; i <= total; i++) {
                const t = i / total;
                const angle = t * Math.PI * 2 * turns;
                const x = 10 * Math.sin(angle * 1.3 + 0.5) + 3 * Math.sin(angle * 2.7 + 1.2);
                const z = t * length - 15;
                let y = 0;
                const ramps = [0.15, 0.35, 0.55, 0.75, 0.92];
                for (const rp of ramps) {
                    const d = Math.abs(t - rp);
                    if (d < 0.06) {
                        const p = d / 0.06;
                        y = Math.max(y, 3.5 * Math.sin(p * Math.PI));
                    }
                }
                y += 0.2 * Math.sin(t * 20);
                pts.push(new THREE.Vector3(x, y, z));
            }
            return pts;
        }
        const pathPoints = generatePath();
        const curve = new THREE.CatmullRomCurve3(pathPoints);

        const ROAD_WIDTH = 5.5;
        const ROAD_SEGMENTS = 300; // reduced

        // ─── Build road ────────────────────────────────────────────
        function buildRoad() {
            const positions = [],
                normals = [],
                uvs = [],
                indices = [];
            for (let i = 0; i <= ROAD_SEGMENTS; i++) {
                const t = i / ROAD_SEGMENTS;
                const pt = curve.getPointAt(t);
                const tan = curve.getTangentAt(t);
                const up = new THREE.Vector3(0, 1, 0);
                const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                if (bin.length() < 0.001) {
                    const alt = new THREE.Vector3(1, 0, 0);
                    bin.crossVectors(tan, alt).normalize();
                }
                const right = bin.clone().normalize();
                const l = pt.clone().add(right.clone().multiplyScalar(-ROAD_WIDTH / 2));
                const r = pt.clone().add(right.clone().multiplyScalar(ROAD_WIDTH / 2));
                const yOff = 0.05;
                positions.push(l.x, l.y + yOff, l.z, r.x, r.y + yOff, r.z);
                normals.push(0, 1, 0, 0, 1, 0);
                uvs.push(0, t, 1, t);
                if (i < ROAD_SEGMENTS) {
                    const b = i * 2;
                    indices.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
                }
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            const mat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9, metalness: 0.1, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.receiveShadow = true;
            mesh.castShadow = false;
            return mesh;
        }
        scene.add(buildRoad());

        // ─── Road markings ─────────────────────────────────────────
        function buildMarkings() {
            const positions = [],
                colors = [];
            const segs = 300;
            const dash = 0.8,
                gap = 0.5,
                half = 0.1;
            for (let i = 0; i < segs; i++) {
                const t = i / segs;
                const pt = curve.getPointAt(t);
                const tan = curve.getTangentAt(t);
                const up = new THREE.Vector3(0, 1, 0);
                const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                if (bin.length() < 0.001) {
                    const alt = new THREE.Vector3(1, 0, 0);
                    bin.crossVectors(tan, alt).normalize();
                }
                const right = bin.clone().normalize();
                const isDash = (i % Math.floor((dash + gap) / (1 / segs))) < Math.floor(dash / (1 / segs));
                if (!isDash) continue;
                const c = pt.clone().add(right.clone().multiplyScalar(-half));
                const d = pt.clone().add(right.clone().multiplyScalar(half));
                const yOff = 0.08;
                positions.push(c.x, c.y + yOff, c.z, d.x, d.y + yOff, d.z);
                colors.push(0.9, 0.9, 0.9, 0.9, 0.9, 0.9);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9 });
            return new THREE.LineSegments(geo, mat);
        }
        scene.add(buildMarkings());

        // ─── Road edge strips ──────────────────────────────────────
        function buildEdges() {
            const group = new THREE.Group();
            const sides = [{ sign: -1, color: 0xff5533 }, { sign: 1, color: 0x33ccff }];
            const segs = 400;
            for (const side of sides) {
                const pts = [];
                for (let i = 0; i <= segs; i++) {
                    const t = i / segs;
                    const pt = curve.getPointAt(t);
                    const tan = curve.getTangentAt(t);
                    const up = new THREE.Vector3(0, 1, 0);
                    const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                    if (bin.length() < 0.001) {
                        const alt = new THREE.Vector3(1, 0, 0);
                        bin.crossVectors(tan, alt).normalize();
                    }
                    const right = bin.clone().normalize();
                    const p = pt.clone().add(right.clone().multiplyScalar(side.sign * ROAD_WIDTH / 2));
                    p.y += 0.08;
                    pts.push(p);
                }
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const mat = new THREE.LineBasicMaterial({ color: side.color, transparent: true, opacity: 0.35 });
                group.add(new THREE.Line(geo, mat));
            }
            return group;
        }
        scene.add(buildEdges());

        // ─── City buildings (optimized) ───────────────────────────
        function createBuilding(x, z, w, d, h, color, emissive) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.y = h / 2;
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            group.add(mesh);

            // Fewer windows: 4x4 grid, lower probability
            const winMat = new THREE.MeshStandardMaterial({
                color: emissive,
                emissive: emissive,
                emissiveIntensity: 0.7,
                roughness: 0.2,
            });
            const grid = 4;
            const spacingX = w / (grid + 1);
            const spacingY = h / (grid + 1);
            for (let i = 0; i < grid; i++) {
                for (let j = 0; j < grid; j++) {
                    if (Math.random() > 0.5) continue;
                    const win = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.2), winMat);
                    const xPos = -w / 2 + spacingX * (i + 1);
                    const yPos = spacingY * (j + 1);
                    // front
                    const f = win.clone();
                    f.position.set(xPos, yPos, d / 2 + 0.01);
                    group.add(f);
                    // back
                    const b = win.clone();
                    b.position.set(xPos, yPos, -d / 2 - 0.01);
                    b.rotation.y = Math.PI;
                    group.add(b);
                    // sides (only some)
                    if (i % 2 === 0) {
                        const s1 = win.clone();
                        s1.position.set(w / 2 + 0.01, yPos, -d / 2 + spacingX * (i + 1));
                        s1.rotation.y = Math.PI / 2;
                        group.add(s1);
                        const s2 = win.clone();
                        s2.position.set(-w / 2 - 0.01, yPos, -d / 2 + spacingX * (i + 1));
                        s2.rotation.y = -Math.PI / 2;
                        group.add(s2);
                    }
                }
            }
            group.position.set(x, 0, z);
            return group;
        }

        const buildingCount = 80; // reduced from 200
        for (let i = 0; i < buildingCount; i++) {
            const t = Math.random();
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const alt = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, alt).normalize();
            }
            const right = bin.clone().normalize();
            const side = Math.random() > 0.5 ? 1 : -1;
            const dist = ROAD_WIDTH / 2 + 1.5 + Math.random() * 4;
            const x = pt.x + right.x * side * dist + (Math.random() - 0.5) * 1.0;
            const z = pt.z + right.z * side * dist + (Math.random() - 0.5) * 1.0;
            const w = 0.8 + Math.random() * 1.2;
            const d = 0.8 + Math.random() * 1.2;
            const h = 3 + Math.random() * 18;
            const hue = 0.6 + Math.random() * 0.25;
            const color = new THREE.Color().setHSL(hue, 0.5, 0.3 + Math.random() * 0.2);
            const emissive = new THREE.Color().setHSL(hue, 0.8, 0.5 + Math.random() * 0.3);
            scene.add(createBuilding(x, z, w, d, h, color, emissive));
        }

        // ─── Street lights (optimized: no PointLight, only emissive) ──
        function createStreetLight(x, z) {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.7, roughness: 0.3 });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 2.8, 6), poleMat);
            pole.position.y = 1.4;
            group.add(pole);
            const armMat = new THREE.MeshStandardMaterial({ color: 0x555566, metalness: 0.6, roughness: 0.4 });
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.04, 0.04), armMat);
            arm.position.set(0.2, 2.8, 0);
            group.add(arm);
            const lightMat = new THREE.MeshStandardMaterial({
                color: 0xffdd77,
                emissive: 0xffaa33,
                emissiveIntensity: 1.5,
            });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), lightMat);
            sphere.position.set(0.4, 2.75, 0);
            group.add(sphere);
            group.position.set(x, 0, z);
            return group;
        }

        const lightCount = 40; // reduced from 120
        for (let i = 0; i < lightCount; i++) {
            const t = i / lightCount;
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const alt = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, alt).normalize();
            }
            const right = bin.clone().normalize();
            const side = (i % 2 === 0) ? 1 : -1;
            const dist = ROAD_WIDTH / 2 + 0.6;
            const x = pt.x + right.x * side * dist;
            const z = pt.z + right.z * side * dist;
            scene.add(createStreetLight(x, z));
        }

        // ─── Ground ────────────────────────────────────────────────
        const groundGeo = new THREE.PlaneGeometry(400, 200);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0e1a, roughness: 1, metalness: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.set(0, -0.5, 30);
        ground.receiveShadow = true;
        scene.add(ground);

        // ─── Distant buildings (silhouettes) ──────────────────────
        for (let i = 0; i < 20; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 70 + Math.random() * 40;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius + 20;
            const h = 15 + Math.random() * 30;
            const w = 2 + Math.random() * 4;
            const d = 2 + Math.random() * 4;
            const mat = new THREE.MeshStandardMaterial({
                color: 0x111122,
                emissive: 0x224466,
                emissiveIntensity: 0.15,
                roughness: 0.8,
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, h / 2 - 2, z);
            scene.add(mesh);
        }

        // ─── Stars ──────────────────────────────────────────────────
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 500;
            if (i % 3 === 1) starPos[i] = Math.random() * 100 + 20;
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // ─── Player car ─────────────────────────────────────────────
        const carGroup = new THREE.Group();

        // Hood
        const hoodMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.3, metalness: 0.7 });
        const hood = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.15, 1.0), hoodMat);
        hood.position.set(0, -0.3, 0.5);
        hood.castShadow = true;
        carGroup.add(hood);

        const scoopMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.3 });
        const scoop = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.3), scoopMat);
        scoop.position.set(0, -0.15, 0.55);
        carGroup.add(scoop);

        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            roughness: 0.05,
            metalness: 0.1,
            transparent: true,
            opacity: 0.35,
        });
        const glass = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 0.05), glassMat);
        glass.position.set(0, 0.2, -0.45);
        carGroup.add(glass);

        const dashMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
        const dash = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.08, 0.3), dashMat);
        dash.position.set(0, 0.02, -0.15);
        carGroup.add(dash);

        // Steering wheel
        const wheelGroup = new THREE.Group();
        const rimMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.2 });
        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 8, 16), rimMat);
        rim.rotation.x = Math.PI / 2;
        wheelGroup.add(rim);
        const hubMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.5 });
        const hub = new THREE.Mesh(new THREE.CircleGeometry(0.05, 8), hubMat);
        hub.rotation.x = -Math.PI / 2;
        hub.position.z = 0.01;
        wheelGroup.add(hub);
        for (let i = 0; i < 3; i++) {
            const spokeMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.4, roughness: 0.3 });
            const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.1, 0.01), spokeMat);
            spoke.rotation.z = (i / 3) * Math.PI * 2;
            wheelGroup.add(spoke);
        }
        wheelGroup.position.set(0, -0.12, -0.2);
        carGroup.add(wheelGroup);

        const mirrorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.6 });
        for (const side of [-1, 1]) {
            const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.12), mirrorMat);
            mirror.position.set(side * 0.6, 0.05, -0.1);
            carGroup.add(mirror);
        }

        const hlMat = new THREE.MeshStandardMaterial({
            color: 0xffffee,
            emissive: 0xffffaa,
            emissiveIntensity: 0.3,
        });
        for (const side of [-1, 1]) {
            const hl = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), hlMat);
            hl.position.set(side * 0.25, -0.1, 0.55);
            hl.scale.set(1, 0.7, 0.4);
            carGroup.add(hl);
        }

        const shadowMat = new THREE.MeshStandardMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.15,
            depthWrite: false,
            roughness: 1,
            metalness: 0,
        });
        const shadow = new THREE.Mesh(new THREE.CircleGeometry(0.5, 16), shadowMat);
        shadow.rotation.x = -Math.PI / 2;
        shadow.position.set(0, -0.45, 0);
        carGroup.add(shadow);

        // Initial position
        const startPt = curve.getPointAt(0);
        carGroup.position.copy(startPt);
        carGroup.position.y += 0.1;
        scene.add(carGroup);

        // ─── Game state ─────────────────────────────────────────────
        const state = {
            t: 0,
            steer: 0,
            speed: 10,
            baseSpeed: 10,
            maxSpeed: 22,
            minSpeed: 4,
            turboActive: false,
            turboTimer: 0,
            turboCooldown: 0,
            jumpActive: false,
            jumpVelocity: 0,
            jumpGravity: -22,
            isGrounded: true,
            onRamp: false,
            distance: 0,
            mouseX: 0,
            mouseY: 0,
        };

        // ─── Controls ──────────────────────────────────────────────
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            state.mouseX = Math.max(-1, Math.min(1, x));
            state.steer = state.mouseX;
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) { e.preventDefault();
                activateTurbo(); }
            if (e.button === 2) { e.preventDefault();
                activateJump(); }
        });
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        let touchId = null;
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            if (touch) {
                const x = (touch.clientX / window.innerWidth) * 2 - 1;
                state.mouseX = Math.max(-1, Math.min(1, x));
                state.steer = state.mouseX;
                touchId = touch.identifier;
                activateTurbo();
            }
        }, { passive: false });
        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId || touchId === null) {
                    const x = (touch.clientX / window.innerWidth) * 2 - 1;
                    state.mouseX = Math.max(-1, Math.min(1, x));
                    state.steer = state.mouseX;
                    touchId = touch.identifier;
                }
            }
        }, { passive: false });
        renderer.domElement.addEventListener('touchend', (e) => { e.preventDefault();
            touchId = null; }, { passive: false });

        function activateTurbo() {
            if (state.turboCooldown > 0) return;
            state.turboActive = true;
            state.turboTimer = 1.2;
            state.turboCooldown = 0.6;
            state.speed = Math.min(state.speed + 7, state.maxSpeed + 5);
            turboDisplay.classList.add('active');
        }

        function activateJump() {
            if (!state.onRamp || !state.isGrounded) return;
            state.jumpActive = true;
            state.jumpVelocity = 9.5;
            state.isGrounded = false;
            rampIndicator.classList.remove('show');
        }

        // ─── Helpers ────────────────────────────────────────────────
        function getRoadData(t) {
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const alt = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, alt).normalize();
            }
            const right = bin.clone().normalize();
            return { pt, tan, right };
        }

        function checkRamp(t) {
            const eps = 0.003;
            const t1 = Math.max(0, t - eps);
            const t2 = Math.min(1, t + eps);
            const p1 = curve.getPointAt(t1);
            const p2 = curve.getPointAt(t2);
            const dy = p2.y - p1.y;
            const dz = p2.z - p1.z;
            const slope = Math.abs(dy) / (Math.abs(dz) + 0.001);
            const height = curve.getPointAt(t).y;
            return height > 0.8 || slope > 0.1;
        }

        // ─── Game loop ──────────────────────────────────────────────
        const clock = new THREE.Clock();

        function update() {
            const delta = Math.min(clock.getDelta(), 0.05);

            // Turbo
            if (state.turboActive) {
                state.turboTimer -= delta;
                if (state.turboTimer <= 0) {
                    state.turboActive = false;
                    state.speed = state.baseSpeed;
                    turboDisplay.classList.remove('active');
                }
            }
            if (state.turboCooldown > 0) state.turboCooldown -= delta;

            // Speed
            const steerFactor = 1 - Math.abs(state.steer) * 0.3;
            let targetSpeed = state.baseSpeed * steerFactor;
            if (state.turboActive) targetSpeed = Math.min(state.maxSpeed + 5, targetSpeed + 9);
            state.speed += (targetSpeed - state.speed) * delta * 2.8;
            state.speed = Math.max(state.minSpeed, Math.min(state.maxSpeed + 5, state.speed));

            // Steer
            state.steer += (state.mouseX - state.steer) * delta * 3.5;
            state.steer = Math.max(-1, Math.min(1, state.steer));

            // Move along path
            const speedFactor = state.speed / 12;
            const dt = delta * 0.07 * speedFactor;
            state.t += dt;
            if (state.t > 1) state.t -= 1;

            // Ramp detection
            state.onRamp = checkRamp(state.t);
            if (state.onRamp && state.isGrounded) {
                rampIndicator.classList.add('show');
            } else {
                if (!state.jumpActive) rampIndicator.classList.remove('show');
            }

            // Jump physics
            if (state.jumpActive) {
                state.jumpVelocity += state.jumpGravity * delta;
                const roadHeight = curve.getPointAt(state.t).y;
                const carY = carGroup.position.y;
                if (carY + state.jumpVelocity * delta <= roadHeight + 0.1) {
                    state.jumpVelocity = 0;
                    state.jumpActive = false;
                    state.isGrounded = true;
                    carGroup.position.y = roadHeight + 0.1;
                } else {
                    carGroup.position.y += state.jumpVelocity * delta;
                    state.isGrounded = false;
                }
            } else {
                const roadHeight = curve.getPointAt(state.t).y;
                carGroup.position.y = roadHeight + 0.1;
                state.isGrounded = true;
            }

            // Road data
            const data = getRoadData(state.t);
            const { pt, tan, right } = data;

            // Lateral offset
            const maxOffset = ROAD_WIDTH / 2 - 0.5;
            const offset = state.steer * maxOffset;
            const lateralPos = pt.clone().add(right.clone().multiplyScalar(offset));
            carGroup.position.x = lateralPos.x;
            carGroup.position.z = lateralPos.z;

            // Car rotation (forward = +Z aligns with tangent)
            const targetAngle = Math.atan2(tan.x, tan.z);
            let currentAngle = carGroup.rotation.y;
            let diff = targetAngle - currentAngle;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            carGroup.rotation.y += diff * delta * 4;

            // Roll
            const rollAmount = -state.steer * 0.07;
            carGroup.rotation.z += (rollAmount - carGroup.rotation.z) * delta * 3;

            // Pitch
            const pitchTarget = Math.atan2(pt.y - curve.getPointAt(Math.max(0, state.t - 0.01)).y, 0.5);
            carGroup.rotation.x += (pitchTarget * 0.3 - carGroup.rotation.x) * delta * 2;

            // Distance
            state.distance += state.speed * delta * 0.6;

            // Camera
            const eyeHeight = 1.4;
            const camPos = carGroup.position.clone();
            camPos.y += eyeHeight;
            camPos.y += state.speed > 2 ? 0.015 * Math.sin(state.distance * 0.08) : 0;
            const lookAhead = 10;
            const targetPos = carGroup.position.clone().add(tan.clone().multiplyScalar(lookAhead));
            targetPos.y += 0.2 + state.mouseY * 0.3;
            camera.position.copy(camPos);
            camera.lookAt(targetPos);

            // HUD
            speedDisplay.textContent = Math.round(state.speed * 8);
            distDisplay.textContent = Math.floor(state.distance);
            if (state.turboActive) {
                turboDisplay.textContent = '⚡';
            } else if (state.turboCooldown > 0) {
                turboDisplay.textContent = '●';
                turboDisplay.style.opacity = '0.3';
            } else {
                turboDisplay.textContent = '●';
                turboDisplay.style.opacity = '1';
            }

            stars.rotation.y += delta * 0.005;
        }

        // ─── Resize ──────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─── Animation loop ─────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        animate();

        // ─── Startup ────────────────────────────────────────────────
        state.t = 0;
        state.distance = 0;
        state.speed = state.baseSpeed;
        const sData = getRoadData(0);
        carGroup.position.copy(sData.pt);
        carGroup.position.y += 0.1;
        carGroup.rotation.y = Math.atan2(sData.tan.x, sData.tan.z);

        console.log('🏙️ City Racer (optimized) ready!');
        console.log('🖱 Move mouse to steer | Left click = Turbo | Right click = Jump (on ramps)');
    </script>
</body>
</html>
