<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Racer - 3D First Person</title>
    <style>
        /* ─── Reset & Fullscreen ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0e1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
            user-select: none;
        }
        canvas {
            display: block;
        }

        /* ─── HUD ─── */
        #hud {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 14px 36px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #hud .stat {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        #hud .stat .label {
            font-weight: 400;
            opacity: 0.5;
            font-size: 13px;
            text-transform: uppercase;
        }
        #hud .stat .value {
            font-size: 22px;
            min-width: 60px;
            text-align: center;
        }
        #hud .stat .value.speed {
            color: #4fc3f7;
        }
        #hud .stat .value.dist {
            color: #81c784;
        }
        #hud .stat .value.turbo {
            color: #ffb74d;
        }
        #hud .stat .value.turbo.active {
            color: #ff6f00;
            text-shadow: 0 0 20px #ff6f00, 0 0 40px #ff6f00;
            animation: pulse 0.3s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.15);
            }
        }

        /* ─── Crosshair ─── */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            opacity: 0.4;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
        }
        #crosshair::before {
            width: 2px;
            height: 18px;
            top: -9px;
            left: -1px;
        }
        #crosshair::after {
            width: 18px;
            height: 2px;
            top: -1px;
            left: -9px;
        }

        /* ─── Instructions ─── */
        #instructions {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 1px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #instructions span {
            display: inline-block;
            margin: 0 10px;
        }
        #instructions .key {
            color: #fff;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ─── Ramp Indicator ─── */
        #ramp-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
            font-size: 44px;
            font-weight: 800;
            color: #ffab00;
            text-shadow: 0 0 30px rgba(255, 171, 0, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #ramp-indicator.show {
            opacity: 1;
            animation: rampPulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes rampPulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @media (max-width: 700px) {
            #hud {
                bottom: 20px;
                padding: 10px 18px;
                gap: 20px;
                font-size: 14px;
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 30px;
                width: 92%;
            }
            #hud .stat .value {
                font-size: 18px;
                min-width: 40px;
            }
            #instructions {
                bottom: 85px;
                font-size: 11px;
                padding: 6px 14px;
                width: 92%;
            }
            #instructions span {
                margin: 0 6px;
            }
            #crosshair {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ─── HUD ─── -->
    <div id="hud">
        <div class="stat">
            <span class="label">Speed</span>
            <span class="value speed" id="speedDisplay">0</span>
        </div>
        <div class="stat">
            <span class="label">Distance</span>
            <span class="value dist" id="distDisplay">0</span>
        </div>
        <div class="stat">
            <span class="label">Turbo</span>
            <span class="value turbo" id="turboDisplay">●</span>
        </div>
    </div>

    <!-- ─── Crosshair ─── -->
    <div id="crosshair"></div>

    <!-- ─── Ramp Indicator ─── -->
    <div id="ramp-indicator">⬆ JUMP</div>

    <!-- ─── Instructions ─── -->
    <div id="instructions">
        <span>🖱 <span class="key">Move</span> to steer</span>
        <span>🖱 <span class="key">Left Click</span> = Turbo</span>
        <span>🖱 <span class="key">Right Click</span> = Jump</span>
    </div>

    <!-- ─── Three.js ─── -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  IMPORTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        import * as THREE from 'three';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DOM REFS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const speedDisplay = document.getElementById('speedDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const turboDisplay = document.getElementById('turboDisplay');
        const rampIndicator = document.getElementById('ramp-indicator');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  THREE.JS SETUP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1a);
        scene.fog = new THREE.Fog(0x0a0e1a, 40, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 2.0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.prepend(renderer.domElement);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LIGHTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const ambientLight = new THREE.AmbientLight(0x223355, 0.3);
        scene.add(ambientLight);

        // Moonlight (subtle)
        const moonLight = new THREE.DirectionalLight(0x88aaff, 0.4);
        moonLight.position.set(-20, 40, 30);
        scene.add(moonLight);

        // City glow from below
        const glowLight = new THREE.PointLight(0xff6622, 0.5, 80);
        glowLight.position.set(0, 5, 0);
        scene.add(glowLight);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ROAD PATH GENERATION (more turns)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function generatePathPoints() {
            const pts = [];
            const totalPoints = 300;
            const length = 120;
            const turns = 6; // number of major turns

            for (let i = 0; i <= totalPoints; i++) {
                const t = i / totalPoints;
                const angle = t * Math.PI * 2 * turns;

                // Use combination of sin/cos for winding road
                const x = 12 * Math.sin(angle * 1.3 + 0.5) + 4 * Math.sin(angle * 2.7 + 1.2);
                const z = t * length - 20;

                // Height with ramps
                let y = 0;
                // Ramps at specific intervals
                const rampPositions = [0.15, 0.35, 0.55, 0.75, 0.92];
                const rampHeight = 3.5;
                for (const rp of rampPositions) {
                    const dist = Math.abs(t - rp);
                    if (dist < 0.06) {
                        const p = (dist / 0.06);
                        const h = rampHeight * Math.sin(p * Math.PI);
                        y = Math.max(y, h);
                    }
                }

                // Add some bumps
                y += 0.3 * Math.sin(t * 20);

                pts.push(new THREE.Vector3(x, y, z));
            }
            return pts;
        }

        const pathPoints = generatePathPoints();
        const curve = new THREE.CatmullRomCurve3(pathPoints);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  BUILD ROAD (dark asphalt)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const ROAD_WIDTH = 5.5;
        const ROAD_SEGMENTS = 600;

        function buildRoad() {
            const positions = [];
            const normals = [];
            const uvs = [];
            const indices = [];

            for (let i = 0; i <= ROAD_SEGMENTS; i++) {
                const t = i / ROAD_SEGMENTS;
                const pt = curve.getPointAt(t);
                const tan = curve.getTangentAt(t);
                const up = new THREE.Vector3(0, 1, 0);
                const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                if (bin.length() < 0.001) {
                    const altUp = new THREE.Vector3(1, 0, 0);
                    bin.crossVectors(tan, altUp).normalize();
                }
                const right = bin.clone().normalize();

                const leftPt = pt.clone().add(right.clone().multiplyScalar(-ROAD_WIDTH / 2));
                const rightPt = pt.clone().add(right.clone().multiplyScalar(ROAD_WIDTH / 2));

                const yOff = 0.05;
                positions.push(leftPt.x, leftPt.y + yOff, leftPt.z);
                positions.push(rightPt.x, rightPt.y + yOff, rightPt.z);

                const n = new THREE.Vector3(0, 1, 0);
                normals.push(n.x, n.y, n.z);
                normals.push(n.x, n.y, n.z);

                uvs.push(0, t);
                uvs.push(1, t);

                if (i < ROAD_SEGMENTS) {
                    const base = i * 2;
                    indices.push(base, base + 1, base + 2);
                    indices.push(base + 1, base + 3, base + 2);
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                roughness: 0.9,
                metalness: 0.1,
                side: THREE.DoubleSide,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.receiveShadow = true;
            mesh.castShadow = false;
            return mesh;
        }

        const roadMesh = buildRoad();
        scene.add(roadMesh);

        // ─── Road markings (glowing dashes) ───
        function buildMarkings() {
            const positions = [];
            const colors = [];
            const segments = 400;
            const dashLen = 0.8;
            const gapLen = 0.5;
            const halfW = 0.1;

            for (let i = 0; i < segments; i++) {
                const t = i / segments;
                const pt = curve.getPointAt(t);
                const tan = curve.getTangentAt(t);
                const up = new THREE.Vector3(0, 1, 0);
                const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                if (bin.length() < 0.001) {
                    const altUp = new THREE.Vector3(1, 0, 0);
                    bin.crossVectors(tan, altUp).normalize();
                }
                const right = bin.clone().normalize();

                const isDash = (i % Math.floor((dashLen + gapLen) / (1 / segments))) < Math.floor(dashLen / (1 / segments));
                if (!isDash) continue;

                const c = pt.clone().add(right.clone().multiplyScalar(-halfW));
                const d = pt.clone().add(right.clone().multiplyScalar(halfW));
                const yOff = 0.08;
                positions.push(c.x, c.y + yOff, c.z);
                positions.push(d.x, d.y + yOff, d.z);

                const col = [0.9, 0.9, 0.9];
                colors.push(col[0], col[1], col[2]);
                colors.push(col[0], col[1], col[2]);
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.LineBasicMaterial({
                vertexColors: true,
                linewidth: 1,
                transparent: true,
                opacity: 0.9,
            });
            const line = new THREE.LineSegments(geo, mat);
            return line;
        }
        scene.add(buildMarkings());

        // ─── Road edges (glowing strips) ───
        function buildEdgeStrips() {
            const group = new THREE.Group();
            const sides = [
                { sign: -1, color: 0xff5533 },
                { sign: 1, color: 0x33ccff },
            ];
            const segments = 500;
            for (const side of sides) {
                const pts = [];
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const pt = curve.getPointAt(t);
                    const tan = curve.getTangentAt(t);
                    const up = new THREE.Vector3(0, 1, 0);
                    const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                    if (bin.length() < 0.001) {
                        const altUp = new THREE.Vector3(1, 0, 0);
                        bin.crossVectors(tan, altUp).normalize();
                    }
                    const right = bin.clone().normalize();
                    const p = pt.clone().add(right.clone().multiplyScalar(side.sign * ROAD_WIDTH / 2));
                    p.y += 0.08;
                    pts.push(p);
                }
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const mat = new THREE.LineBasicMaterial({
                    color: side.color,
                    transparent: true,
                    opacity: 0.4,
                });
                const line = new THREE.Line(geo, mat);
                group.add(line);
            }
            return group;
        }
        scene.add(buildEdgeStrips());

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CITY BUILDINGS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function createBuilding(x, z, width, depth, height, color, emissiveColor) {
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(width, height, depth);
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.6,
                metalness: 0.1,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = height / 2;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            group.add(mesh);

            // Windows (emissive boxes)
            const winMat = new THREE.MeshStandardMaterial({
                color: emissiveColor,
                emissive: emissiveColor,
                emissiveIntensity: 0.8,
                roughness: 0.2,
            });
            const winCount = 6;
            const spacingX = width / (winCount + 1);
            const spacingY = height / (winCount + 1);
            for (let i = 0; i < winCount; i++) {
                for (let j = 0; j < winCount; j++) {
                    if (Math.random() > 0.4) continue; // some windows off
                    const w = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.25), winMat);
                    const xPos = -width / 2 + spacingX * (i + 1);
                    const yPos = spacingY * (j + 1);
                    // Place on front face
                    w.position.set(xPos, yPos, depth / 2 + 0.01);
                    group.add(w);
                    // Back face
                    const w2 = w.clone();
                    w2.position.set(xPos, yPos, -depth / 2 - 0.01);
                    w2.rotation.y = Math.PI;
                    group.add(w2);
                    // Side faces
                    if (i % 2 === 0) {
                        const w3 = w.clone();
                        w3.position.set(width / 2 + 0.01, yPos, -depth / 2 + spacingX * (i + 1));
                        w3.rotation.y = Math.PI / 2;
                        group.add(w3);
                        const w4 = w.clone();
                        w4.position.set(-width / 2 - 0.01, yPos, -depth / 2 + spacingX * (i + 1));
                        w4.rotation.y = -Math.PI / 2;
                        group.add(w4);
                    }
                }
            }

            group.position.set(x, 0, z);
            return group;
        }

        // Generate buildings along the road
        const buildingPositions = [];
        const buildingCount = 200;
        for (let i = 0; i < buildingCount; i++) {
            const t = Math.random();
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const altUp = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, altUp).normalize();
            }
            const right = bin.clone().normalize();
            const side = Math.random() > 0.5 ? 1 : -1;
            const dist = ROAD_WIDTH / 2 + 1.5 + Math.random() * 4.5;
            const x = pt.x + right.x * side * dist + (Math.random() - 0.5) * 1.0;
            const z = pt.z + right.z * side * dist + (Math.random() - 0.5) * 1.0;
            const width = 0.8 + Math.random() * 1.2;
            const depth = 0.8 + Math.random() * 1.2;
            const height = 3 + Math.random() * 20;
            const hue = 0.6 + Math.random() * 0.25; // blue-ish to purple
            const color = new THREE.Color().setHSL(hue, 0.5, 0.3 + Math.random() * 0.2);
            const emissive = new THREE.Color().setHSL(hue, 0.8, 0.5 + Math.random() * 0.3);
            buildingPositions.push({ x, z, width, depth, height, color, emissive });
        }

        for (const b of buildingPositions) {
            const building = createBuilding(b.x, b.z, b.width, b.depth, b.height, b.color, b.emissive);
            scene.add(building);
        }

        // ─── Street lights ───
        function createStreetLight(x, z) {
            const group = new THREE.Group();
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.7, roughness: 0.3 });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 2.8, 6), poleMat);
            pole.position.y = 1.4;
            group.add(pole);

            const armMat = new THREE.MeshStandardMaterial({ color: 0x555566, metalness: 0.6, roughness: 0.4 });
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.04, 0.04), armMat);
            arm.position.set(0.2, 2.8, 0);
            group.add(arm);

            // Light sphere
            const lightMat = new THREE.MeshStandardMaterial({
                color: 0xffdd77,
                emissive: 0xffaa33,
                emissiveIntensity: 2,
            });
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), lightMat);
            sphere.position.set(0.4, 2.75, 0);
            group.add(sphere);

            // Point light
            const pl = new THREE.PointLight(0xffaa44, 1.5, 12);
            pl.position.set(0.4, 2.7, 0);
            group.add(pl);

            group.position.set(x, 0, z);
            return group;
        }

        // Place street lights along road
        for (let i = 0; i < 120; i++) {
            const t = i / 120;
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const altUp = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, altUp).normalize();
            }
            const right = bin.clone().normalize();
            const side = (i % 2 === 0) ? 1 : -1;
            const dist = ROAD_WIDTH / 2 + 0.6;
            const x = pt.x + right.x * side * dist;
            const z = pt.z + right.z * side * dist;
            const light = createStreetLight(x, z);
            scene.add(light);
        }

        // ─── Ground plane (dark) ───
        const groundGeo = new THREE.PlaneGeometry(400, 200);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x0a0e1a,
            roughness: 1,
            metalness: 0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.set(0, -0.5, 30);
        ground.receiveShadow = true;
        scene.add(ground);

        // ─── Skyline / distant buildings (glow) ───
        // We'll add a few tall buildings far away as silhouettes
        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 80 + Math.random() * 40;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius + 20;
            const h = 15 + Math.random() * 30;
            const w = 2 + Math.random() * 4;
            const d = 2 + Math.random() * 4;
            const mat = new THREE.MeshStandardMaterial({
                color: 0x111122,
                emissive: 0x224466,
                emissiveIntensity: 0.2,
                roughness: 0.8,
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, h / 2 - 2, z);
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            scene.add(mesh);
        }

        // ─── Stars (twinkling) ───
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1500;
        const starPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 500;
            if (i % 3 === 1) starPos[i] = Math.random() * 100 + 20;
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.2,
            transparent: true,
            opacity: 0.7,
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  PLAYER CAR (first person)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const carGroup = new THREE.Group();

        // Hood
        const hoodMat = new THREE.MeshStandardMaterial({
            color: 0xcc2222,
            roughness: 0.3,
            metalness: 0.7,
        });
        const hood = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.15, 1.0), hoodMat);
        hood.position.set(0, -0.3, 0.5);
        hood.castShadow = true;
        carGroup.add(hood);

        // Hood scoop
        const scoopMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4, metalness: 0.3 });
        const scoop = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.3), scoopMat);
        scoop.position.set(0, -0.15, 0.55);
        carGroup.add(scoop);

        // Windshield
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            roughness: 0.05,
            metalness: 0.1,
            transparent: true,
            opacity: 0.35,
        });
        const glass = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 0.05), glassMat);
        glass.position.set(0, 0.2, -0.45);
        carGroup.add(glass);

        // Dashboard
        const dashMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
        const dash = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.08, 0.3), dashMat);
        dash.position.set(0, 0.02, -0.15);
        carGroup.add(dash);

        // Steering wheel
        const wheelGroup = new THREE.Group();
        const rimMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.2 });
        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 8, 16), rimMat);
        rim.rotation.x = Math.PI / 2;
        wheelGroup.add(rim);

        const hubMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.5 });
        const hub = new THREE.Mesh(new THREE.CircleGeometry(0.05, 8), hubMat);
        hub.rotation.x = -Math.PI / 2;
        hub.position.z = 0.01;
        wheelGroup.add(hub);

        for (let i = 0; i < 3; i++) {
            const spokeMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.4, roughness: 0.3 });
            const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.1, 0.01), spokeMat);
            spoke.rotation.z = (i / 3) * Math.PI * 2;
            wheelGroup.add(spoke);
        }
        wheelGroup.position.set(0, -0.12, -0.2);
        carGroup.add(wheelGroup);

        // Side mirrors
        const mirrorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.6 });
        for (const side of [-1, 1]) {
            const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.12), mirrorMat);
            mirror.position.set(side * 0.6, 0.05, -0.1);
            carGroup.add(mirror);
        }

        // Headlights
        const hlMat = new THREE.MeshStandardMaterial({
            color: 0xffffee,
            emissive: 0xffffaa,
            emissiveIntensity: 0.3,
        });
        for (const side of [-1, 1]) {
            const hl = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), hlMat);
            hl.position.set(side * 0.25, -0.1, 0.55);
            hl.scale.set(1, 0.7, 0.4);
            carGroup.add(hl);
        }

        // Shadow disc
        const shadowMat = new THREE.MeshStandardMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.15,
            depthWrite: false,
            roughness: 1,
            metalness: 0,
        });
        const shadow = new THREE.Mesh(new THREE.CircleGeometry(0.5, 16), shadowMat);
        shadow.rotation.x = -Math.PI / 2;
        shadow.position.set(0, -0.45, 0);
        carGroup.add(shadow);

        // Initial position
        const startPt = curve.getPointAt(0);
        carGroup.position.copy(startPt);
        carGroup.position.y += 0.1;
        scene.add(carGroup);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  GAME STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const state = {
            t: 0,
            steer: 0,
            speed: 10,
            baseSpeed: 10,
            maxSpeed: 22,
            minSpeed: 4,
            turboActive: false,
            turboTimer: 0,
            turboCooldown: 0,
            jumpActive: false,
            jumpVelocity: 0,
            jumpGravity: -22,
            isGrounded: true,
            onRamp: false,
            distance: 0,
            mouseX: 0,
            mouseY: 0,
            leftPressed: false,
            rightPressed: false,
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CONTROLS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            state.mouseX = Math.max(-1, Math.min(1, x));
            state.steer = state.mouseX;
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                e.preventDefault();
                state.leftPressed = true;
                activateTurbo();
            }
            if (e.button === 2) {
                e.preventDefault();
                state.rightPressed = true;
                activateJump();
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) state.leftPressed = false;
            if (e.button === 2) state.rightPressed = false;
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // Touch
        let touchId = null;
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            if (touch) {
                const x = (touch.clientX / window.innerWidth) * 2 - 1;
                state.mouseX = Math.max(-1, Math.min(1, x));
                state.steer = state.mouseX;
                touchId = touch.identifier;
                activateTurbo();
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId || touchId === null) {
                    const x = (touch.clientX / window.innerWidth) * 2 - 1;
                    state.mouseX = Math.max(-1, Math.min(1, x));
                    state.steer = state.mouseX;
                    touchId = touch.identifier;
                }
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchId = null;
        }, { passive: false });

        // ─── Turbo ───
        function activateTurbo() {
            if (state.turboCooldown > 0) return;
            state.turboActive = true;
            state.turboTimer = 1.2;
            state.turboCooldown = 0.6;
            state.speed = Math.min(state.speed + 7, state.maxSpeed + 5);
            turboDisplay.classList.add('active');
        }

        // ─── Jump ───
        function activateJump() {
            if (!state.onRamp || !state.isGrounded) return;
            state.jumpActive = true;
            state.jumpVelocity = 9.5;
            state.isGrounded = false;
            rampIndicator.classList.remove('show');
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  HELPER
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function getRoadData(t) {
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const altUp = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, altUp).normalize();
            }
            const right = bin.clone().normalize();
            return { pt, tan, right, up };
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RAMP DETECTION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function checkRamp(t) {
            const eps = 0.003;
            const t1 = Math.max(0, t - eps);
            const t2 = Math.min(1, t + eps);
            const p1 = curve.getPointAt(t1);
            const p2 = curve.getPointAt(t2);
            const dy = p2.y - p1.y;
            const dz = p2.z - p1.z;
            const slope = Math.abs(dy) / (Math.abs(dz) + 0.001);
            const height = curve.getPointAt(t).y;
            return height > 0.8 || slope > 0.1;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  GAME LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const clock = new THREE.Clock();

        function update() {
            const delta = Math.min(clock.getDelta(), 0.05);

            // ── Turbo ──
            if (state.turboActive) {
                state.turboTimer -= delta;
                if (state.turboTimer <= 0) {
                    state.turboActive = false;
                    state.speed = state.baseSpeed;
                    turboDisplay.classList.remove('active');
                }
            }
            if (state.turboCooldown > 0) state.turboCooldown -= delta;

            // ── Speed ──
            const steerFactor = 1 - Math.abs(state.steer) * 0.3;
            let targetSpeed = state.baseSpeed * steerFactor;
            if (state.turboActive) targetSpeed = Math.min(state.maxSpeed + 5, targetSpeed + 9);
            state.speed += (targetSpeed - state.speed) * delta * 2.8;
            state.speed = Math.max(state.minSpeed, Math.min(state.maxSpeed + 5, state.speed));

            // ── Steer ──
            const steerSpeed = 3.5;
            const targetSteer = state.mouseX;
            state.steer += (targetSteer - state.steer) * delta * steerSpeed;
            state.steer = Math.max(-1, Math.min(1, state.steer));

            // ── Move along path ──
            const speedFactor = state.speed / 12;
            const dt = delta * 0.07 * speedFactor;
            state.t += dt;
            if (state.t > 1) state.t -= 1;

            // ── Ramp detection ──
            state.onRamp = checkRamp(state.t);
            if (state.onRamp && state.isGrounded) {
                rampIndicator.classList.add('show');
            } else {
                if (!state.jumpActive) rampIndicator.classList.remove('show');
            }

            // ── Jump physics ──
            if (state.jumpActive) {
                state.jumpVelocity += state.jumpGravity * delta;
                const roadHeight = curve.getPointAt(state.t).y;
                const carY = carGroup.position.y;
                if (carY + state.jumpVelocity * delta <= roadHeight + 0.1) {
                    state.jumpVelocity = 0;
                    state.jumpActive = false;
                    state.isGrounded = true;
                    carGroup.position.y = roadHeight + 0.1;
                } else {
                    carGroup.position.y += state.jumpVelocity * delta;
                    state.isGrounded = false;
                }
            } else {
                const roadHeight = curve.getPointAt(state.t).y;
                carGroup.position.y = roadHeight + 0.1;
                state.isGrounded = true;
            }

            // ── Road data ──
            const data = getRoadData(state.t);
            const { pt, tan, right } = data;

            // ── Lateral offset ──
            const maxOffset = ROAD_WIDTH / 2 - 0.5;
            const offset = state.steer * maxOffset;
            const lateralPos = pt.clone().add(right.clone().multiplyScalar(offset));

            carGroup.position.x = lateralPos.x;
            carGroup.position.z = lateralPos.z;

            // ── Car rotation (forward = tangent) ──
            // We want car's local -Z to point along tangent
            const targetAngle = Math.atan2(tan.x, -tan.z);
            let currentAngle = carGroup.rotation.y;
            let diff = targetAngle - currentAngle;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            carGroup.rotation.y += diff * delta * 4;

            // ── Roll ──
            const rollAmount = -state.steer * 0.07;
            carGroup.rotation.z += (rollAmount - carGroup.rotation.z) * delta * 3;

            // ── Pitch ──
            const pitchTarget = Math.atan2(pt.y - curve.getPointAt(Math.max(0, state.t - 0.01)).y, 0.5);
            carGroup.rotation.x += (pitchTarget * 0.3 - carGroup.rotation.x) * delta * 2;

            // ── Distance ──
            state.distance += state.speed * delta * 0.6;

            // ── Camera ──
            const eyeHeight = 1.4;
            const camPos = carGroup.position.clone();
            camPos.y += eyeHeight;
            const bobAmount = state.speed > 2 ? 0.015 * Math.sin(state.distance * 0.08) : 0;
            camPos.y += bobAmount;

            // Look ahead along tangent
            const lookAhead = 10;
            const targetPos = carGroup.position.clone().add(tan.clone().multiplyScalar(lookAhead));
            targetPos.y += 0.2 + state.mouseY * 0.3;

            camera.position.copy(camPos);
            camera.lookAt(targetPos);

            // ── HUD ──
            const speedKmh = Math.round(state.speed * 8);
            speedDisplay.textContent = speedKmh;
            distDisplay.textContent = Math.floor(state.distance);

            if (state.turboActive) {
                turboDisplay.textContent = '⚡';
            } else if (state.turboCooldown > 0) {
                turboDisplay.textContent = '●';
                turboDisplay.style.opacity = '0.3';
            } else {
                turboDisplay.textContent = '●';
                turboDisplay.style.opacity = '1';
            }

            // ── Stars rotation ──
            stars.rotation.y += delta * 0.005;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RESIZE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ANIMATION LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        animate();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  STARTUP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        state.t = 0;
        state.distance = 0;
        state.speed = state.baseSpeed;
        const startData = getRoadData(0);
        carGroup.position.copy(startData.pt);
        carGroup.position.y += 0.1;
        const startAngle = Math.atan2(startData.tan.x, -startData.tan.z);
        carGroup.rotation.y = startAngle;

        console.log('🏙️ City Racer ready!');
        console.log('🖱 Move mouse to steer');
        console.log('🖱 Left click = Turbo');
        console.log('🖱 Right click = Jump (on ramps)');
    </script>
</body>
</html>
