<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Racing Game - First Person</title>
    <style>
        /* ─── Reset & Fullscreen ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
            user-select: none;
        }
        canvas {
            display: block;
        }

        /* ─── HUD ─── */
        #hud {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 60px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 14px 40px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #hud .stat {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        #hud .stat .label {
            font-weight: 400;
            opacity: 0.6;
            font-size: 14px;
            text-transform: uppercase;
        }
        #hud .stat .value {
            font-size: 22px;
            min-width: 60px;
            text-align: center;
        }
        #hud .stat .value.speed {
            color: #4fc3f7;
        }
        #hud .stat .value.dist {
            color: #81c784;
        }
        #hud .stat .value.turbo {
            color: #ffb74d;
        }

        /* turbo active glow */
        #hud .stat .value.turbo.active {
            color: #ff6f00;
            text-shadow: 0 0 20px #ff6f00, 0 0 40px #ff6f00;
            animation: pulse 0.3s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.15);
            }
        }

        /* ─── Crosshair ─── */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            opacity: 0.5;
        }
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            top: -10px;
            left: -1px;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            top: -1px;
            left: -10px;
        }

        /* ─── Instructions ─── */
        #instructions {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #instructions span {
            display: inline-block;
            margin: 0 12px;
        }
        #instructions .key {
            color: #fff;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* ─── Ramp Indicator ─── */
        #ramp-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 4;
            font-size: 40px;
            font-weight: 800;
            color: #ffab00;
            text-shadow: 0 0 30px rgba(255, 171, 0, 0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #ramp-indicator.show {
            opacity: 1;
            animation: rampPulse 0.6s ease-in-out infinite alternate;
        }
        @keyframes rampPulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* ─── Responsive ─── */
        @media (max-width: 700px) {
            #hud {
                bottom: 20px;
                padding: 10px 20px;
                gap: 20px;
                font-size: 14px;
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 30px;
                width: 90%;
            }
            #hud .stat .value {
                font-size: 18px;
                min-width: 40px;
            }
            #instructions {
                bottom: 90px;
                font-size: 11px;
                padding: 6px 14px;
                width: 90%;
            }
            #instructions span {
                margin: 0 6px;
            }
            #crosshair {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ─── HUD ─── -->
    <div id="hud">
        <div class="stat">
            <span class="label">Speed</span>
            <span class="value speed" id="speedDisplay">0</span>
        </div>
        <div class="stat">
            <span class="label">Distance</span>
            <span class="value dist" id="distDisplay">0</span>
        </div>
        <div class="stat">
            <span class="label">Turbo</span>
            <span class="value turbo" id="turboDisplay">●</span>
        </div>
    </div>

    <!-- ─── Crosshair ─── -->
    <div id="crosshair"></div>

    <!-- ─── Ramp Indicator ─── -->
    <div id="ramp-indicator">⬆ JUMP</div>

    <!-- ─── Instructions ─── -->
    <div id="instructions">
        <span>🖱 <span class="key">Move</span> to steer</span>
        <span>🖱 <span class="key">Left Click</span> = Turbo</span>
        <span>🖱 <span class="key">Right Click</span> = Jump</span>
    </div>

    <!-- ─── Three.js ─── -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  IMPORTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        import * as THREE from 'three';

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  DOM REFS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const speedDisplay = document.getElementById('speedDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const turboDisplay = document.getElementById('turboDisplay');
        const rampIndicator = document.getElementById('ramp-indicator');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  THREE.JS SETUP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2a3a);
        scene.fog = new THREE.Fog(0x1a2a3a, 60, 150);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 2.0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.prepend(renderer.domElement);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  LIGHTS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const ambientLight = new THREE.AmbientLight(0x446688, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.8);
        sunLight.position.set(30, 50, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 120;
        sunLight.shadow.camera.left = -60;
        sunLight.shadow.camera.right = 60;
        sunLight.shadow.camera.top = 60;
        sunLight.shadow.camera.bottom = -60;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88bbff, 0.3);
        fillLight.position.set(-20, 30, -30);
        scene.add(fillLight);

        const hemiLight = new THREE.HemisphereLight(0x88ccff, 0x445533, 0.6);
        scene.add(hemiLight);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ROAD PATH GENERATION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function generatePathPoints() {
            const pts = [];
            const totalPoints = 180;
            const radius = 50;
            const heightAmp = 4;

            for (let i = 0; i <= totalPoints; i++) {
                const t = i / totalPoints;
                const angle = t * Math.PI * 3.5;

                // Spiral-ish path with curves and ramps
                const x = Math.sin(angle) * radius * (0.6 + 0.4 * Math.sin(t * 2.3));
                const z = t * 85 - 15;

                // Height: ramps at certain intervals
                let y = 0;
                // Ramp 1: at t ≈ 0.2
                const r1 = 0.18,
                    r1w = 0.08;
                if (t > r1 - r1w && t < r1 + r1w) {
                    const p = (t - (r1 - r1w)) / (2 * r1w);
                    y = heightAmp * Math.sin(p * Math.PI);
                }
                // Ramp 2: at t ≈ 0.5
                const r2 = 0.48,
                    r2w = 0.08;
                if (t > r2 - r2w && t < r2 + r2w) {
                    const p = (t - (r2 - r2w)) / (2 * r2w);
                    y = heightAmp * 0.7 * Math.sin(p * Math.PI);
                }
                // Ramp 3: at t ≈ 0.78
                const r3 = 0.76,
                    r3w = 0.07;
                if (t > r3 - r3w && t < r3 + r3w) {
                    const p = (t - (r3 - r3w)) / (2 * r3w);
                    y = heightAmp * 0.9 * Math.sin(p * Math.PI);
                }
                // Ramp 4: at t ≈ 0.95
                const r4 = 0.93,
                    r4w = 0.06;
                if (t > r4 - r4w && t < r4 + r4w) {
                    const p = (t - (r4 - r4w)) / (2 * r4w);
                    y = heightAmp * 0.5 * Math.sin(p * Math.PI);
                }

                pts.push(new THREE.Vector3(x, y, z));
            }
            return pts;
        }

        const pathPoints = generatePathPoints();
        const curve = new THREE.CatmullRomCurve3(pathPoints);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  BUILD ROAD MESH
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const ROAD_WIDTH = 5.0;
        const ROAD_SEGMENTS = 800;

        function buildRoad() {
            const positions = [];
            const normals = [];
            const uvs = [];
            const indices = [];

            for (let i = 0; i <= ROAD_SEGMENTS; i++) {
                const t = i / ROAD_SEGMENTS;
                const pt = curve.getPointAt(t);
                const tan = curve.getTangentAt(t);
                const up = new THREE.Vector3(0, 1, 0);
                const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                // if bin is near zero, use a fallback
                if (bin.length() < 0.001) {
                    const altUp = new THREE.Vector3(1, 0, 0);
                    bin.crossVectors(tan, altUp).normalize();
                }
                const right = bin.clone().normalize();

                const leftPt = pt.clone().add(right.clone().multiplyScalar(-ROAD_WIDTH / 2));
                const rightPt = pt.clone().add(right.clone().multiplyScalar(ROAD_WIDTH / 2));

                // slightly raise road surface for better shadow
                const yOff = 0.05;
                positions.push(leftPt.x, leftPt.y + yOff, leftPt.z);
                positions.push(rightPt.x, rightPt.y + yOff, rightPt.z);

                const n = new THREE.Vector3(0, 1, 0);
                normals.push(n.x, n.y, n.z);
                normals.push(n.x, n.y, n.z);

                uvs.push(0, t);
                uvs.push(1, t);

                if (i < ROAD_SEGMENTS) {
                    const base = i * 2;
                    indices.push(base, base + 1, base + 2);
                    indices.push(base + 1, base + 3, base + 2);
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geo.setIndex(indices);
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({
                color: 0x3a4a5a,
                roughness: 0.8,
                metalness: 0.1,
                side: THREE.DoubleSide,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.receiveShadow = true;
            mesh.castShadow = false;
            return mesh;
        }

        const roadMesh = buildRoad();
        scene.add(roadMesh);

        // ─── Road markings (center line) ───
        function buildMarkings() {
            const positions = [];
            const colors = [];
            const segments = 300;
            const dashLen = 0.8;
            const gapLen = 0.6;
            const halfW = 0.12;

            let totalLen = 0;
            for (let i = 0; i < segments; i++) {
                const t = i / segments;
                const pt = curve.getPointAt(t);
                const tan = curve.getTangentAt(t);
                const up = new THREE.Vector3(0, 1, 0);
                const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                if (bin.length() < 0.001) {
                    const altUp = new THREE.Vector3(1, 0, 0);
                    bin.crossVectors(tan, altUp).normalize();
                }
                const right = bin.clone().normalize();

                const isDash = (i % Math.floor((dashLen + gapLen) / (1 / segments))) < Math.floor(dashLen / (1 / segments));
                if (!isDash) continue;

                const c = pt.clone().add(right.clone().multiplyScalar(-halfW));
                const d = pt.clone().add(right.clone().multiplyScalar(halfW));
                const yOff = 0.08;
                positions.push(c.x, c.y + yOff, c.z);
                positions.push(d.x, d.y + yOff, d.z);

                const col = [1, 1, 1];
                colors.push(col[0], col[1], col[2]);
                colors.push(col[0], col[1], col[2]);
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const mat = new THREE.LineBasicMaterial({
                vertexColors: true,
                linewidth: 1,
            });
            const line = new THREE.LineSegments(geo, mat);
            return line;
        }

        scene.add(buildMarkings());

        // ─── Road edges (glow strips) ───
        function buildEdgeStrips() {
            const group = new THREE.Group();
            const sides = [
                { sign: -1, color: 0xff6644 },
                { sign: 1, color: 0x44bbff },
            ];
            const segments = 400;
            for (const side of sides) {
                const pts = [];
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const pt = curve.getPointAt(t);
                    const tan = curve.getTangentAt(t);
                    const up = new THREE.Vector3(0, 1, 0);
                    const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
                    if (bin.length() < 0.001) {
                        const altUp = new THREE.Vector3(1, 0, 0);
                        bin.crossVectors(tan, altUp).normalize();
                    }
                    const right = bin.clone().normalize();
                    const p = pt.clone().add(right.clone().multiplyScalar(side.sign * ROAD_WIDTH / 2));
                    p.y += 0.08;
                    pts.push(p);
                }
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const mat = new THREE.LineBasicMaterial({
                    color: side.color,
                    transparent: true,
                    opacity: 0.3,
                });
                const line = new THREE.Line(geo, mat);
                group.add(line);
            }
            return group;
        }
        scene.add(buildEdgeStrips());

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ENVIRONMENT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // ─── Ground ───
        const groundGeo = new THREE.PlaneGeometry(400, 200);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x2d3d2d,
            roughness: 0.9,
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.set(0, -0.5, 40);
        ground.receiveShadow = true;
        scene.add(ground);

        // ─── Trees ───
        function createTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.25, 1.8, 6),
                new THREE.MeshStandardMaterial({ color: 0x6b4c3b, roughness: 0.9 })
            );
            trunk.position.y = 0.9;
            trunk.castShadow = true;
            group.add(trunk);

            const crown = new THREE.Mesh(
                new THREE.SphereGeometry(0.9 + Math.random() * 0.5, 6, 6),
                new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0.28 + Math.random() * 0.06, 0.6, 0.35 + Math.random() * 0.15),
                    roughness: 0.8,
                })
            );
            crown.position.y = 2.0 + Math.random() * 0.5;
            crown.scale.y = 0.8 + Math.random() * 0.4;
            crown.castShadow = true;
            group.add(crown);

            group.position.set(x, -0.2, z);
            const scale = 0.8 + Math.random() * 0.6;
            group.scale.set(scale, scale, scale);
            group.rotation.y = Math.random() * Math.PI * 2;
            return group;
        }

        // Place trees along the road
        const treePositions = [];
        for (let i = 0; i < 160; i++) {
            const t = Math.random();
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const altUp = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, altUp).normalize();
            }
            const right = bin.clone().normalize();
            const side = Math.random() > 0.5 ? 1 : -1;
            const dist = ROAD_WIDTH / 2 + 1.5 + Math.random() * 4;
            const x = pt.x + right.x * side * dist + (Math.random() - 0.5) * 1.5;
            const z = pt.z + right.z * side * dist + (Math.random() - 0.5) * 1.5;
            treePositions.push({ x, z });
        }
        for (const pos of treePositions) {
            const tree = createTree(pos.x, pos.z);
            scene.add(tree);
        }

        // ─── Sky particles (stars) ───
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 400;
            if (i % 3 === 1) starPos[i] = Math.random() * 80 + 10;
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.3,
            transparent: true,
            opacity: 0.6,
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  PLAYER CAR (first person – we only see the hood)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const carGroup = new THREE.Group();

        // Hood
        const hoodGeo = new THREE.BoxGeometry(0.9, 0.15, 1.0);
        const hoodMat = new THREE.MeshStandardMaterial({
            color: 0xcc2222,
            roughness: 0.3,
            metalness: 0.7,
        });
        const hood = new THREE.Mesh(hoodGeo, hoodMat);
        hood.position.set(0, -0.3, 0.5);
        hood.castShadow = true;
        carGroup.add(hood);

        // Hood scoop
        const scoopGeo = new THREE.BoxGeometry(0.3, 0.12, 0.3);
        const scoopMat = new THREE.MeshStandardMaterial({
            color: 0x222222,
            roughness: 0.4,
            metalness: 0.3,
        });
        const scoop = new THREE.Mesh(scoopGeo, scoopMat);
        scoop.position.set(0, -0.15, 0.55);
        carGroup.add(scoop);

        // Windshield (reflection)
        const glassGeo = new THREE.BoxGeometry(1.0, 0.3, 0.05);
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0x88ccff,
            roughness: 0.05,
            metalness: 0.1,
            transparent: true,
            opacity: 0.35,
        });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.set(0, 0.2, -0.45);
        carGroup.add(glass);

        // Dashboard
        const dashGeo = new THREE.BoxGeometry(0.8, 0.08, 0.3);
        const dashMat = new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.8,
        });
        const dash = new THREE.Mesh(dashGeo, dashMat);
        dash.position.set(0, 0.02, -0.15);
        carGroup.add(dash);

        // Steering wheel (visible in first person)
        const wheelGroup = new THREE.Group();
        const rimGeo = new THREE.TorusGeometry(0.12, 0.025, 8, 16);
        const rimMat = new THREE.MeshStandardMaterial({
            color: 0x222222,
            roughness: 0.5,
            metalness: 0.2,
        });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.x = Math.PI / 2;
        wheelGroup.add(rim);

        const hubGeo = new THREE.CircleGeometry(0.05, 8);
        const hubMat = new THREE.MeshStandardMaterial({
            color: 0x444444,
            roughness: 0.3,
            metalness: 0.5,
        });
        const hub = new THREE.Mesh(hubGeo, hubMat);
        hub.rotation.x = -Math.PI / 2;
        hub.position.z = 0.01;
        wheelGroup.add(hub);

        // Spokes
        for (let i = 0; i < 3; i++) {
            const spokeGeo = new THREE.BoxGeometry(0.01, 0.1, 0.01);
            const spokeMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.4, roughness: 0.3 });
            const spoke = new THREE.Mesh(spokeGeo, spokeMat);
            spoke.rotation.z = (i / 3) * Math.PI * 2;
            spoke.position.set(0, 0, 0);
            wheelGroup.add(spoke);
        }

        wheelGroup.position.set(0, -0.12, -0.2);
        wheelGroup.scale.set(1, 1, 1);
        carGroup.add(wheelGroup);

        // Side mirrors (small)
        const mirrorMat = new THREE.MeshStandardMaterial({
            color: 0x333333,
            roughness: 0.2,
            metalness: 0.6,
        });
        for (const side of [-1, 1]) {
            const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.12), mirrorMat);
            mirror.position.set(side * 0.6, 0.05, -0.1);
            carGroup.add(mirror);
        }

        // Headlights
        const hlMat = new THREE.MeshStandardMaterial({
            color: 0xffffee,
            emissive: 0xffffaa,
            emissiveIntensity: 0.3,
        });
        for (const side of [-1, 1]) {
            const hl = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), hlMat);
            hl.position.set(side * 0.25, -0.1, 0.55);
            hl.scale.set(1, 0.7, 0.4);
            carGroup.add(hl);
        }

        // Car shadow (under the car, subtle)
        const shadowGeo = new THREE.CircleGeometry(0.5, 16);
        const shadowMat = new THREE.MeshStandardMaterial({
            color: 0x000000,
            transparent: true,
            opacity: 0.15,
            depthWrite: false,
            roughness: 1,
            metalness: 0,
        });
        const shadow = new THREE.Mesh(shadowGeo, shadowMat);
        shadow.rotation.x = -Math.PI / 2;
        shadow.position.set(0, -0.45, 0);
        carGroup.add(shadow);

        // Position the car initially
        const startPt = curve.getPointAt(0);
        const startTan = curve.getTangentAt(0);
        carGroup.position.copy(startPt);
        carGroup.position.y += 0.1;
        // Face forward
        const angle = Math.atan2(startTan.x, startTan.z);
        carGroup.rotation.y = angle;

        scene.add(carGroup);

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  GAME STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const state = {
            // Position along path (0..1)
            t: 0,
            // Lateral offset from center (-1..1)
            steer: 0,
            // Speed
            speed: 8,
            baseSpeed: 8,
            maxSpeed: 18,
            minSpeed: 3,
            // Turbo
            turboActive: false,
            turboTimer: 0,
            turboCooldown: 0,
            // Jump
            jumpActive: false,
            jumpVelocity: 0,
            jumpGravity: -22,
            isGrounded: true,
            // Ramp detection
            onRamp: false,
            // Distance
            distance: 0,
            // Mouse
            mouseX: 0,
            mouseY: 0,
            // Input flags
            leftPressed: false,
            rightPressed: false,
        };

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  CONTROLS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        // Mouse move → steering
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            state.mouseX = Math.max(-1, Math.min(1, x));
            state.steer = state.mouseX;
        });

        // Left click → Turbo
        document.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                e.preventDefault();
                state.leftPressed = true;
                activateTurbo();
            }
            if (e.button === 2) {
                e.preventDefault();
                state.rightPressed = true;
                activateJump();
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                state.leftPressed = false;
            }
            if (e.button === 2) {
                state.rightPressed = false;
            }
        });

        // Prevent context menu
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // Touch support for mobile
        let touchId = null;
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            if (touch) {
                const x = (touch.clientX / window.innerWidth) * 2 - 1;
                state.mouseX = Math.max(-1, Math.min(1, x));
                state.steer = state.mouseX;
                touchId = touch.identifier;
                // Simple tap: left click = turbo, right click not available on mobile
                activateTurbo();
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const touch of e.changedTouches) {
                if (touch.identifier === touchId || touchId === null) {
                    const x = (touch.clientX / window.innerWidth) * 2 - 1;
                    state.mouseX = Math.max(-1, Math.min(1, x));
                    state.steer = state.mouseX;
                    touchId = touch.identifier;
                }
            }
        }, { passive: false });

        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchId = null;
        }, { passive: false });

        // ─── Turbo ───
        function activateTurbo() {
            if (state.turboCooldown > 0) return;
            state.turboActive = true;
            state.turboTimer = 1.2;
            state.turboCooldown = 0.6;
            state.speed = Math.min(state.speed + 6, state.maxSpeed + 4);
            turboDisplay.classList.add('active');
        }

        // ─── Jump ───
        function activateJump() {
            if (!state.onRamp || !state.isGrounded) return;
            state.jumpActive = true;
            state.jumpVelocity = 9.0;
            state.isGrounded = false;
            // visual feedback
            rampIndicator.classList.remove('show');
            // small screen shake / effect
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  HELPER: get road data at t
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function getRoadData(t) {
            const pt = curve.getPointAt(t);
            const tan = curve.getTangentAt(t);
            const up = new THREE.Vector3(0, 1, 0);
            const bin = new THREE.Vector3().crossVectors(tan, up).normalize();
            if (bin.length() < 0.001) {
                const altUp = new THREE.Vector3(1, 0, 0);
                bin.crossVectors(tan, altUp).normalize();
            }
            const right = bin.clone().normalize();
            return { pt, tan, right, up };
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RAMP DETECTION
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function checkRamp(t) {
            // Check if current position is on a ramp by looking at height derivative
            const eps = 0.002;
            const t1 = Math.max(0, t - eps);
            const t2 = Math.min(1, t + eps);
            const p1 = curve.getPointAt(t1);
            const p2 = curve.getPointAt(t2);
            const dy = p2.y - p1.y;
            const dz = p2.z - p1.z;
            const slope = Math.abs(dy) / (Math.abs(dz) + 0.001);
            // Also check if we're on a ramp section by looking at height
            const height = curve.getPointAt(t).y;
            const isRamp = height > 0.6 || slope > 0.08;
            return isRamp;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  GAME LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const clock = new THREE.Clock();

        function update() {
            const delta = Math.min(clock.getDelta(), 0.05);

            // ── Turbo timer ──
            if (state.turboActive) {
                state.turboTimer -= delta;
                if (state.turboTimer <= 0) {
                    state.turboActive = false;
                    state.speed = state.baseSpeed;
                    turboDisplay.classList.remove('active');
                }
            }
            if (state.turboCooldown > 0) {
                state.turboCooldown -= delta;
            }

            // ── Speed ──
            // Speed varies slightly with steering (slow down in turns)
            const steerFactor = 1 - Math.abs(state.steer) * 0.25;
            let targetSpeed = state.baseSpeed * steerFactor;
            if (state.turboActive) {
                targetSpeed = Math.min(state.maxSpeed + 4, targetSpeed + 8);
            }
            state.speed += (targetSpeed - state.speed) * delta * 2.5;
            state.speed = Math.max(state.minSpeed, Math.min(state.maxSpeed + 4, state.speed));

            // ── Steer ──
            const steerSpeed = 3.2;
            const targetSteer = state.mouseX;
            state.steer += (targetSteer - state.steer) * delta * steerSpeed;
            state.steer = Math.max(-1, Math.min(1, state.steer));

            // ── Move along path ──
            const speedFactor = state.speed / 12;
            const dt = delta * 0.08 * speedFactor;
            state.t += dt;
            if (state.t > 1) {
                state.t -= 1;
                // loop: distance continues
            }

            // ── Ramp detection ──
            state.onRamp = checkRamp(state.t);
            if (state.onRamp && state.isGrounded) {
                rampIndicator.classList.add('show');
            } else {
                if (!state.jumpActive) {
                    rampIndicator.classList.remove('show');
                }
            }

            // ── Jump physics ──
            if (state.jumpActive) {
                state.jumpVelocity += state.jumpGravity * delta;
                // Check if landed
                const roadHeight = curve.getPointAt(state.t).y;
                const carY = carGroup.position.y;
                if (carY + state.jumpVelocity * delta <= roadHeight + 0.1) {
                    state.jumpVelocity = 0;
                    state.jumpActive = false;
                    state.isGrounded = true;
                    carGroup.position.y = roadHeight + 0.1;
                } else {
                    carGroup.position.y += state.jumpVelocity * delta;
                    state.isGrounded = false;
                }
            } else {
                // Stick to road
                const roadHeight = curve.getPointAt(state.t).y;
                carGroup.position.y = roadHeight + 0.1;
                state.isGrounded = true;
            }

            // ── Get road data ──
            const data = getRoadData(state.t);
            const { pt, tan, right } = data;

            // ── Lateral offset ──
            const maxOffset = ROAD_WIDTH / 2 - 0.5;
            const offset = state.steer * maxOffset;
            const lateralPos = pt.clone().add(right.clone().multiplyScalar(offset));

            // ── Update car position ──
            carGroup.position.x = lateralPos.x;
            carGroup.position.z = lateralPos.z;
            // y is handled by jump/road stick

            // ── Car rotation ──
            const lookTarget = pt.clone().add(tan.clone().multiplyScalar(2));
            const dir = new THREE.Vector3().copy(lookTarget).sub(carGroup.position);
            dir.y = 0;
            if (dir.length() > 0.01) {
                const targetAngle = Math.atan2(dir.x, dir.z);
                let currentAngle = carGroup.rotation.y;
                let diff = targetAngle - currentAngle;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                carGroup.rotation.y += diff * delta * 4;
            }

            // ── Slight body roll during turns ──
            const rollAmount = -state.steer * 0.06;
            carGroup.rotation.z += (rollAmount - carGroup.rotation.z) * delta * 3;

            // ── Slight pitch on ramps ──
            const pitchTarget = Math.atan2(pt.y - curve.getPointAt(Math.max(0, state.t - 0.01)).y, 0.5);
            carGroup.rotation.x += (pitchTarget * 0.3 - carGroup.rotation.x) * delta * 2;

            // ── Distance ──
            state.distance += state.speed * delta * 0.6;

            // ── Camera (First Person) ──
            const eyeHeight = 1.4;
            const camPos = carGroup.position.clone();
            camPos.y += eyeHeight;

            // Add a subtle head bob
            const bobAmount = state.speed > 2 ? 0.015 * Math.sin(state.distance * 0.08) : 0;
            camPos.y += bobAmount;

            // Look direction: forward from car, with slight mouse Y influence
            const fwd = new THREE.Vector3(0, 0, -1);
            fwd.applyQuaternion(carGroup.quaternion);
            const lookAhead = 8;
            const targetPos = carGroup.position.clone().add(fwd.clone().multiplyScalar(lookAhead));
            targetPos.y += 0.2 + state.mouseY * 0.3;

            camera.position.copy(camPos);
            camera.lookAt(targetPos);

            // ── Update HUD ──
            const speedKmh = Math.round(state.speed * 8);
            speedDisplay.textContent = speedKmh;
            distDisplay.textContent = Math.floor(state.distance);

            // Turbo indicator
            if (state.turboActive) {
                turboDisplay.textContent = '⚡';
            } else if (state.turboCooldown > 0) {
                turboDisplay.textContent = '●';
                turboDisplay.style.opacity = '0.3';
            } else {
                turboDisplay.textContent = '●';
                turboDisplay.style.opacity = '1';
            }

            // ── Stars rotation ──
            stars.rotation.y += delta * 0.008;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RESIZE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  ANIMATION LOOP
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        animate();

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  STARTUP: reset state
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        state.t = 0;
        state.distance = 0;
        state.speed = state.baseSpeed;
        const startData = getRoadData(0);
        carGroup.position.copy(startData.pt);
        carGroup.position.y += 0.1;
        const startAngle = Math.atan2(startData.tan.x, startData.tan.z);
        carGroup.rotation.y = startAngle;

        console.log('🏁 3D Racing Game ready!');
        console.log('🖱 Move mouse to steer');
        console.log('🖱 Left click = Turbo');
        console.log('🖱 Right click = Jump (on ramps)');

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  EXPOSE FOR DEBUG (optional)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        window.__game = { scene, camera, carGroup, curve, state };
    </script>
</body>
</html>
