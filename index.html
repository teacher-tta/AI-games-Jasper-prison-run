<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚓 Prison Break - Escape the Police!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .game-wrapper {
            background: #16213e;
            padding: 20px 30px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #0f3460;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px 12px 8px;
            color: #e0e0e0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 1px;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 15px;
            font-weight: 600;
            background: #0a0a1a;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #2a3a6a;
        }
        .stats span {
            color: #aaa;
        }
        .stats .value {
            color: #fff;
            min-width: 40px;
            display: inline-block;
            text-align: center;
        }
        .stats .value.police-count {
            color: #ff6b6b;
        }
        .stats .value.wanted {
            color: #ffd93d;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: #2d4059;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
            width: 1000px;
            height: 700px;
            image-rendering: pixelated;
            cursor: none;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            flex-wrap: wrap;
            gap: 10px;
            color: #aab;
            font-size: 13px;
        }
        .controls kbd {
            background: #2a2a4a;
            padding: 3px 12px;
            border-radius: 6px;
            border: 1px solid #4a4a6a;
            color: #ddd;
            font-size: 13px;
            font-weight: 700;
        }
        .btn-restart {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .btn-restart:hover {
            transform: scale(1.04);
            background: #ff6b81;
            box-shadow: 0 6px 25px rgba(233, 69, 96, 0.5);
        }
        .btn-restart:active {
            transform: scale(0.95);
        }
        .status-msg {
            color: #ffd93d;
            font-weight: 700;
            font-size: 14px;
            min-height: 22px;
            text-shadow: 0 0 20px rgba(255, 217, 61, 0.2);
        }
        @media (max-width: 1060px) {
            .game-wrapper {
                padding: 12px;
                border-radius: 16px;
            }
            canvas {
                width: 90vw;
                height: calc(90vw * 0.7);
                max-width: 1000px;
                max-height: 700px;
            }
            .header h1 {
                font-size: 18px;
            }
            .stats {
                font-size: 13px;
                padding: 4px 12px;
            }
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
            }
            .stats {
                justify-content: space-around;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                text-align: center;
            }
            .btn-restart {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="header">
            <h1>🚓 PRISON BREAK</h1>
            <div class="stats">
                <span>⏱ <span class="value" id="timerDisplay">0</span>s</span>
                <span>🚔 <span class="value police-count" id="policeCount">0</span></span>
                <span>⭐ <span class="value wanted" id="wantedLevel">1</span></span>
            </div>
        </div>

        <canvas id="gameCanvas" width="1000" height="700"></canvas>

        <div class="controls">
            <div>
                <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>↑</kbd> <kbd>←</kbd> <kbd>↓</kbd> <kbd>→</kbd>
                <span style="margin-left:12px;color:#888;">|</span>
                <span style="margin-left:12px;color:#aaa;">Drive · Escape · Survive</span>
            </div>
            <div class="status-msg" id="statusMsg">🚗 Break out of prison!</div>
            <button class="btn-restart" id="restartBtn">🔄 New Game</button>
        </div>
    </div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  GAME – Prison Break (Roblox Barry's Prison Run style)
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1000,
            H = 700;

        // ─── DOM refs ───
        const timerDisplay = document.getElementById('timerDisplay');
        const policeCountEl = document.getElementById('policeCount');
        const wantedLevelEl = document.getElementById('wantedLevel');
        const statusMsg = document.getElementById('statusMsg');
        const restartBtn = document.getElementById('restartBtn');

        // ─── Constants ───
        const TILE = 25;
        const COLS = 40;
        const ROWS = 28;

        // ─── Map tiles ───
        const T = {
            ROAD: 0,
            BUILDING: 1,
            POLICE: 2,
            PRISON: 3,
            ESCAPE: 4,
            WALL: 5,
            GRASS: 6,
        };

        // ─── Generate map ───────────────────────────
        function buildMap() {
            const map = [];
            for (let r = 0; r < ROWS; r++) {
                map[r] = [];
                for (let c = 0; c < COLS; c++) {
                    // default grass
                    map[r][c] = T.GRASS;
                }
            }

            // road grid: every 3rd row/col (with 2-cell wide roads)
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const isHorizRoad = (r % 4 === 0 || r % 4 === 1);
                    const isVertRoad = (c % 4 === 0 || c % 4 === 1);
                    if (isHorizRoad || isVertRoad) {
                        map[r][c] = T.ROAD;
                    }
                }
            }

            // ── Police station (top-right area) ──
            const psR = 2,
                psC = 30,
                psH = 6,
                psW = 8;
            for (let r = psR; r < psR + psH; r++) {
                for (let c = psC; c < psC + psW; c++) {
                    if (r < ROWS && c < COLS) {
                        // outer walls
                        if (r === psR || r === psR + psH - 1 || c === psC || c === psC + psW - 1) {
                            map[r][c] = T.WALL;
                        } else {
                            map[r][c] = T.POLICE;
                        }
                    }
                }
            }
            // gate opening in police station wall (bottom)
            for (let c = psC + 2; c < psC + psW - 2; c++) {
                if (psR + psH - 1 < ROWS) {
                    map[psR + psH - 1][c] = T.ROAD;
                }
            }
            // prison cell inside police station (top-left corner of interior)
            for (let r = psR + 1; r < psR + 4; r++) {
                for (let c = psC + 1; c < psC + 4; c++) {
                    if (r < ROWS && c < COLS) {
                        map[r][c] = T.PRISON;
                    }
                }
            }
            // prison walls (bars)
            for (let r = psR + 1; r < psR + 4; r++) {
                map[r][psC + 1] = T.WALL;
                map[r][psC + 3] = T.WALL;
            }
            for (let c = psC + 1; c < psC + 4; c++) {
                map[psR + 1][c] = T.WALL;
                map[psR + 3][c] = T.WALL;
            }
            // prison door (opening)
            map[psR + 2][psC + 2] = T.ROAD;

            // ── Escape zone (bottom-left) ──
            for (let r = ROWS - 5; r < ROWS - 2; r++) {
                for (let c = 2; c < 6; c++) {
                    if (r < ROWS && c < COLS) {
                        map[r][c] = T.ESCAPE;
                    }
                }
            }

            // ── Some buildings for decoration ──
            const buildings = [
                [3, 6, 3, 4],
                [3, 12, 3, 4],
                [3, 18, 3, 4],
                [3, 24, 3, 4],
                [7, 6, 3, 4],
                [7, 12, 3, 4],
                [7, 18, 3, 4],
                [7, 24, 3, 4],
                [11, 6, 3, 4],
                [11, 12, 3, 4],
                [11, 18, 3, 4],
                [11, 24, 3, 4],
                [15, 6, 3, 4],
                [15, 12, 3, 4],
                [15, 18, 3, 4],
                [15, 24, 3, 4],
                [19, 6, 3, 4],
                [19, 12, 3, 4],
                [19, 18, 3, 4],
                [19, 24, 3, 4],
                [23, 6, 3, 4],
                [23, 12, 3, 4],
                [23, 18, 3, 4],
                [23, 24, 3, 4],
                // extra buildings on the right
                [3, 34, 3, 4],
                [7, 34, 3, 4],
                [11, 34, 3, 4],
                [15, 34, 3, 4],
                [19, 34, 3, 4],
                [23, 34, 3, 4],
                // bottom buildings
                [24, 10, 3, 4],
                [24, 16, 3, 4],
                [24, 22, 3, 4],
                [24, 28, 3, 4],
                [24, 34, 3, 4],
            ];
            for (const [br, bc, bh, bw] of buildings) {
                for (let r = br; r < br + bh; r++) {
                    for (let c = bc; c < bc + bw; c++) {
                        if (r < ROWS && c < COLS && map[r][c] === T.GRASS) {
                            map[r][c] = T.BUILDING;
                        }
                    }
                }
            }

            // make sure escape zone is not overwritten
            for (let r = ROWS - 5; r < ROWS - 2; r++) {
                for (let c = 2; c < 6; c++) {
                    if (r < ROWS && c < COLS) {
                        map[r][c] = T.ESCAPE;
                    }
                }
            }

            return map;
        }

        let map = buildMap();

        // ─── Helper: tile center ───
        function tileCenter(col, row) {
            return { x: col * TILE + TILE / 2, y: row * TILE + TILE / 2 };
        }

        // ─── Find start position (prison) ───
        function findStart() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === T.PRISON) {
                        return tileCenter(c, r);
                    }
                }
            }
            return { x: 200, y: 200 };
        }

        // ─── Find escape zone center ───
        function findEscape() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] === T.ESCAPE) {
                        return tileCenter(c, r);
                    }
                }
            }
            return { x: 100, y: 600 };
        }

        // ─── Game state ─────────────────────────────
        const startPos = findStart();
        const escapePos = findEscape();

        let player = {
            x: startPos.x,
            y: startPos.y,
            angle: 0,
            speed: 0,
            maxSpeed: 3.8,
            accel: 0.12,
            brake: 0.08,
            friction: 0.97,
            turnSpeed: 0.045,
            radius: 10,
            width: 16,
            height: 10,
            escaped: false,
            caught: false,
            won: false,
            inPrison: true,
        };

        let police = [];
        let gameTime = 0;
        let score = 0;
        let wantedLevel = 1;
        let gameOver = false;
        let win = false;
        let frameCount = 0;
        let policeSpawnTimer = 0;
        const MAX_POLICE = 12;
        let keys = {};

        // ─── Police class ────────────────────────────
        class PoliceCar {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0;
                this.maxSpeed = 1.8 + Math.random() * 0.8;
                this.accel = 0.06;
                this.turnSpeed = 0.035;
                this.radius = 12;
                this.width = 18;
                this.height = 11;
                this.state = 'chase'; // 'chase' | 'patrol'
                this.patrolTarget = { x: Math.random() * W, y: Math.random() * H };
                this.updatePatrolTarget();
                this.stuckTimer = 0;
                this.id = Math.random().toString(36).substr(2, 6);
            }

            updatePatrolTarget() {
                this.patrolTarget = {
                    x: 50 + Math.random() * (W - 100),
                    y: 50 + Math.random() * (H - 100)
                };
            }

            update(p, mapData) {
                const dx = p.x - this.x;
                const dy = p.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // switch state based on distance
                if (dist < 350) {
                    this.state = 'chase';
                } else if (dist > 500) {
                    this.state = 'patrol';
                }

                let targetAngle = this.angle;

                if (this.state === 'chase') {
                    // chase the player with some randomness
                    const noise = (Math.random() - 0.5) * 0.3;
                    targetAngle = Math.atan2(dy, dx) + noise;
                    // if too close, back off slightly
                    if (dist < 50) {
                        targetAngle = Math.atan2(-dy, -dx) + (Math.random() - 0.5) * 0.5;
                    }
                    // speed up when chasing
                    this.maxSpeed = 1.8 + Math.random() * 0.6 + (wantedLevel - 1) * 0.15;
                } else {
                    // patrol
                    const pdx = this.patrolTarget.x - this.x;
                    const pdy = this.patrolTarget.y - this.y;
                    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                    if (pdist < 30) {
                        this.updatePatrolTarget();
                    }
                    targetAngle = Math.atan2(pdy, pdx);
                    this.maxSpeed = 1.2;
                }

                // smooth turning
                let angleDiff = targetAngle - this.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                const maxTurn = this.turnSpeed * 1.5;
                if (angleDiff > maxTurn) angleDiff = maxTurn;
                if (angleDiff < -maxTurn) angleDiff = -maxTurn;
                this.angle += angleDiff;

                // move forward
                this.speed += this.accel;
                if (this.speed > this.maxSpeed) this.speed = this.maxSpeed;

                const moveX = Math.cos(this.angle) * this.speed;
                const moveY = Math.sin(this.angle) * this.speed;
                const newX = this.x + moveX;
                const newY = this.y + moveY;

                // collision with walls/buildings
                if (!isColliding(newX, newY, this.radius, mapData)) {
                    this.x = newX;
                    this.y = newY;
                } else {
                    // try sliding
                    if (!isColliding(newX, this.y, this.radius, mapData)) {
                        this.x = newX;
                    } else if (!isColliding(this.x, newY, this.radius, mapData)) {
                        this.y = newY;
                    } else {
                        this.speed *= 0.5;
                    }
                }

                // keep in bounds
                this.x = Math.max(this.radius, Math.min(W - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(H - this.radius, this.y));

                // check if stuck
                this.stuckTimer += 0.01;
                if (this.stuckTimer > 60) {
                    this.updatePatrolTarget();
                    this.stuckTimer = 0;
                }
                if (this.speed < 0.3) this.stuckTimer += 0.1;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // body
                const w = this.width,
                    h = this.height;
                const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, w);
                grad.addColorStop(0, '#4a6fa5');
                grad.addColorStop(1, '#1a2a4a');
                ctx.fillStyle = grad;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.roundRect(-w / 2, -h / 2, w, h, 3);
                ctx.fill();

                // roof light
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffd93d';
                ctx.beginPath();
                ctx.arc(0, -h / 2 - 2, 4, 0, Math.PI * 2);
                ctx.fill();
                // flashing light
                const flash = Math.sin(frameCount * 0.08) > 0;
                ctx.fillStyle = flash ? '#ff6b6b' : '#4a6fa5';
                ctx.beginPath();
                ctx.arc(0, -h / 2 - 2, 3, 0, Math.PI * 2);
                ctx.fill();

                // windshield
                ctx.fillStyle = 'rgba(180, 220, 255, 0.3)';
                ctx.beginPath();
                ctx.roundRect(-w / 2 + 3, -h / 2 + 2, w - 6, 3, 1);
                ctx.fill();

                // headlights
                ctx.fillStyle = '#ffd93d';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ffd93d';
                ctx.beginPath();
                ctx.arc(w / 2 - 1, -h / 4, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w / 2 - 1, h / 4, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.restore();
            }
        }

        // ─── roundRect polyfill for canvas ───────────
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // ─── Collision detection ─────────────────────
        function isColliding(x, y, radius, mapData) {
            const margin = 4;
            const r = radius + margin;
            const c1 = Math.floor((x - r) / TILE);
            const c2 = Math.floor((x + r) / TILE);
            const r1 = Math.floor((y - r) / TILE);
            const r2 = Math.floor((y + r) / TILE);
            for (let row = r1; row <= r2; row++) {
                for (let col = c1; col <= c2; col++) {
                    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
                    const tile = mapData[row][col];
                    if (tile === T.BUILDING || tile === T.WALL || tile === T.POLICE) {
                        // check distance to tile center
                        const cx = col * TILE + TILE / 2;
                        const cy = row * TILE + TILE / 2;
                        const dx = x - cx;
                        const dy = y - cy;
                        const half = TILE / 2 + radius;
                        if (Math.abs(dx) < half && Math.abs(dy) < half) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function isOnRoad(x, y) {
            const col = Math.floor(x / TILE);
            const row = Math.floor(y / TILE);
            if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
            const tile = map[row][col];
            return tile === T.ROAD || tile === T.PRISON || tile === T.ESCAPE || tile === T.POLICE;
        }

        // ─── Spawn police ────────────────────────────
        function spawnPolice() {
            if (police.length >= MAX_POLICE) return;
            // spawn near police station or at random road
            let spawnX, spawnY;
            const tries = 50;
            for (let i = 0; i < tries; i++) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                if (map[r][c] === T.ROAD || map[r][c] === T.POLICE) {
                    const pos = tileCenter(c, r);
                    // don't spawn on player
                    const dx = pos.x - player.x;
                    const dy = pos.y - player.y;
                    if (Math.sqrt(dx * dx + dy * dy) > 150) {
                        spawnX = pos.x;
                        spawnY = pos.y;
                        break;
                    }
                }
            }
            if (spawnX === undefined) return;
            const p = new PoliceCar(spawnX, spawnY);
            police.push(p);
        }

        // ─── Reset game ──────────────────────────────
        function resetGame() {
            const s = findStart();
            player.x = s.x;
            player.y = s.y;
            player.angle = 0;
            player.speed = 0;
            player.escaped = false;
            player.caught = false;
            player.won = false;
            player.inPrison = true;
            police = [];
            gameTime = 0;
            score = 0;
            wantedLevel = 1;
            gameOver = false;
            win = false;
            frameCount = 0;
            policeSpawnTimer = 0;
            statusMsg.textContent = '🚗 Break out of prison!';
            statusMsg.style.color = '#ffd93d';
            // reset map
            map = buildMap();
            // spawn initial police
            for (let i = 0; i < 2; i++) {
                setTimeout(() => spawnPolice(), i * 300);
            }
        }

        // ─── Update ──────────────────────────────────
        function update() {
            if (gameOver || win) return;
            frameCount++;
            gameTime += 1 / 60;

            // ── Player input ──
            let accel = 0,
                turn = 0;
            if (keys['w'] || keys['arrowup']) accel = 1;
            if (keys['s'] || keys['arrowdown']) accel = -0.6;
            if (keys['a'] || keys['arrowleft']) turn = -1;
            if (keys['d'] || keys['arrowright']) turn = 1;

            // speed
            if (accel > 0) {
                player.speed += player.accel * accel;
            } else if (accel < 0) {
                player.speed -= player.brake * Math.abs(accel);
            } else {
                player.speed *= player.friction;
            }
            if (Math.abs(player.speed) > player.maxSpeed) {
                player.speed = Math.sign(player.speed) * player.maxSpeed;
            }
            if (Math.abs(player.speed) < 0.02) player.speed = 0;

            // turn
            if (Math.abs(player.speed) > 0.1) {
                const turnFactor = Math.min(Math.abs(player.speed) / player.maxSpeed, 1);
                player.angle += turn * player.turnSpeed * turnFactor;
            }

            // move
            const moveX = Math.cos(player.angle) * player.speed;
            const moveY = Math.sin(player.angle) * player.speed;
            const newX = player.x + moveX;
            const newY = player.y + moveY;

            // collision with buildings/walls
            const radius = player.radius;
            if (!isColliding(newX, newY, radius, map)) {
                player.x = newX;
                player.y = newY;
            } else {
                // slide along walls
                if (!isColliding(newX, player.y, radius, map)) {
                    player.x = newX;
                } else if (!isColliding(player.x, newY, radius, map)) {
                    player.y = newY;
                } else {
                    player.speed *= 0.3;
                }
            }

            // keep in bounds
            player.x = Math.max(radius, Math.min(W - radius, player.x));
            player.y = Math.max(radius, Math.min(H - radius, player.y));

            // ── Check prison escape ──
            const col = Math.floor(player.x / TILE);
            const row = Math.floor(player.y / TILE);
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                const tile = map[row][col];
                if (tile === T.ROAD && player.inPrison) {
                    // check if far enough from prison
                    const psR = 2,
                        psC = 30;
                    const distFromPrison = Math.sqrt(
                        Math.pow(player.x - (psC * TILE + TILE * 4), 2) +
                        Math.pow(player.y - (psR * TILE + TILE * 2), 2)
                    );
                    if (distFromPrison > 100) {
                        player.inPrison = false;
                        player.escaped = true;
                        statusMsg.textContent = '🚨 You escaped! Now evade the police!';
                        statusMsg.style.color = '#ff6b6b';
                        wantedLevel = 1;
                        // spawn more police
                        for (let i = 0; i < 3; i++) {
                            setTimeout(() => spawnPolice(), i * 500 + 300);
                        }
                    }
                }
                // check escape zone
                if (tile === T.ESCAPE && !player.inPrison) {
                    // check if player is in the escape zone area
                    const ezR = ROWS - 5,
                        ezC = 2;
                    const distFromEscape = Math.sqrt(
                        Math.pow(player.x - (ezC * TILE + TILE * 2), 2) +
                        Math.pow(player.y - (ezR * TILE + TILE * 1.5), 2)
                    );
                    if (distFromEscape < 60) {
                        win = true;
                        gameOver = true;
                        player.won = true;
                        statusMsg.textContent = '🏆 YOU ESCAPED! FREEDOM! 🏆';
                        statusMsg.style.color = '#4ade80';
                        return;
                    }
                }
            }

            // ── Wanted level ──
            if (!player.inPrison && !gameOver) {
                wantedLevel = 1 + Math.floor(gameTime / 15);
                if (wantedLevel > 5) wantedLevel = 5;
                // more police at higher wanted levels
                const targetPolice = Math.min(2 + wantedLevel * 2, MAX_POLICE);
                if (police.length < targetPolice && frameCount % 60 === 0) {
                    if (Math.random() < 0.3 + wantedLevel * 0.05) {
                        spawnPolice();
                    }
                }
            }

            // ── Police AI ──
            for (const p of police) {
                p.update(player, map);
            }

            // remove police that are stuck or out of bounds
            police = police.filter(p => {
                if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) return false;
                return true;
            });

            // ── Police collision with player ──
            for (const p of police) {
                const dx = p.x - player.x;
                const dy = p.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < p.radius + player.radius - 2 && !player.inPrison) {
                    // caught!
                    gameOver = true;
                    player.caught = true;
                    statusMsg.textContent = '💀 CAUGHT! The police got you!';
                    statusMsg.style.color = '#ff1744';
                    return;
                }
            }

            // ── Police-police collision avoidance ──
            for (let i = 0; i < police.length; i++) {
                for (let j = i + 1; j < police.length; j++) {
                    const a = police[i],
                        b = police[j];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = a.radius + b.radius;
                    if (dist < minDist && dist > 0.01) {
                        const push = (minDist - dist) * 0.3;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        a.x -= nx * push;
                        a.y -= ny * push;
                        b.x += nx * push;
                        b.y += ny * push;
                    }
                }
            }

            // ── Timer ──
            timerDisplay.textContent = Math.floor(gameTime);
            policeCountEl.textContent = police.length;
            wantedLevelEl.textContent = wantedLevel;

            // ── Auto-spawn police ──
            if (!player.inPrison && !gameOver) {
                policeSpawnTimer++;
                const spawnInterval = Math.max(60, 300 - wantedLevel * 30);
                if (policeSpawnTimer > spawnInterval && police.length < MAX_POLICE) {
                    if (Math.random() < 0.5 + wantedLevel * 0.05) {
                        spawnPolice();
                    }
                    policeSpawnTimer = 0;
                }
            }
        }

        // ─── Draw ────────────────────────────────────
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // ── Draw map ──
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const x = c * TILE,
                        y = r * TILE;
                    const tile = map[r][c];
                    switch (tile) {
                        case T.ROAD:
                            ctx.fillStyle = '#4a5a6a';
                            ctx.fillRect(x, y, TILE, TILE);
                            // road lines
                            if ((r % 4 === 0 || r % 4 === 1) && (c % 4 === 0 || c % 4 === 1)) {
                                ctx.fillStyle = 'rgba(255,255,200,0.08)';
                                ctx.fillRect(x, y, TILE, TILE);
                            }
                            // dashed center lines
                            if (r % 4 === 0 && c % 4 === 0) {
                                ctx.fillStyle = 'rgba(255,255,200,0.25)';
                                ctx.fillRect(x + TILE / 2 - 1, y, 2, TILE);
                                ctx.fillRect(x, y + TILE / 2 - 1, TILE, 2);
                            }
                            break;
                        case T.GRASS:
                            const shade = ((r + c) % 2 === 0) ? '#3a8a4a' : '#4a9a5a';
                            ctx.fillStyle = shade;
                            ctx.fillRect(x, y, TILE, TILE);
                            break;
                        case T.BUILDING:
                            ctx.fillStyle = '#6a5a4a';
                            ctx.fillRect(x, y, TILE, TILE);
                            ctx.fillStyle = '#5a4a3a';
                            ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                            // window
                            ctx.fillStyle = 'rgba(255,220,100,0.3)';
                            ctx.fillRect(x + 4, y + 4, 6, 6);
                            ctx.fillRect(x + TILE - 10, y + 4, 6, 6);
                            ctx.fillRect(x + 4, y + TILE - 10, 6, 6);
                            ctx.fillRect(x + TILE - 10, y + TILE - 10, 6, 6);
                            break;
                        case T.POLICE:
                            ctx.fillStyle = '#2a4a7a';
                            ctx.fillRect(x, y, TILE, TILE);
                            ctx.fillStyle = '#3a6a9a';
                            ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                            // police star
                            ctx.fillStyle = '#ffd93d';
                            ctx.font = '14px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('⭐', x + TILE / 2, y + TILE / 2);
                            break;
                        case T.WALL:
                            ctx.fillStyle = '#4a3a3a';
                            ctx.fillRect(x, y, TILE, TILE);
                            ctx.fillStyle = '#3a2a2a';
                            ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
                            // brick pattern
                            ctx.fillStyle = 'rgba(80,60,50,0.3)';
                            for (let br = 0; br < 3; br++) {
                                for (let bc = 0; bc < 3; bc++) {
                                    if ((br + bc) % 2 === 0) {
                                        ctx.fillRect(x + 2 + bc * 7, y + 2 + br * 7, 4, 4);
                                    }
                                }
                            }
                            break;
                        case T.PRISON:
                            ctx.fillStyle = '#4a3a5a';
                            ctx.fillRect(x, y, TILE, TILE);
                            ctx.fillStyle = '#3a2a4a';
                            ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                            // bars
                            ctx.fillStyle = '#8a7a8a';
                            for (let i = 0; i < 4; i++) {
                                ctx.fillRect(x + 3 + i * 6, y + 2, 2, TILE - 4);
                            }
                            break;
                        case T.ESCAPE:
                            // glowing escape zone
                            const pulse = Math.sin(frameCount * 0.03) * 0.3 + 0.7;
                            ctx.fillStyle = `rgba(50, 220, 80, ${pulse * 0.6})`;
                            ctx.fillRect(x, y, TILE, TILE);
                            ctx.fillStyle = `rgba(50, 220, 80, ${pulse * 0.3})`;
                            ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                            ctx.fillStyle = '#4ade80';
                            ctx.font = '16px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText('🚁', x + TILE / 2, y + TILE / 2);
                            break;
                        default:
                            ctx.fillStyle = '#3a8a4a';
                            ctx.fillRect(x, y, TILE, TILE);
                    }
                }
            }

            // ── Police station label ──
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            const psCX = 30 * TILE + TILE * 4;
            const psCY = 2 * TILE + TILE * 0.5;
            ctx.fillText('🚔 POLICE STATION', psCX, psCY - 4);

            // ── Escape zone label ──
            const ezCX = 2 * TILE + TILE * 2;
            const ezCY = (ROWS - 5) * TILE + TILE * 0.5;
            ctx.fillStyle = 'rgba(74, 222, 128, 0.7)';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('🏁 EXIT', ezCX, ezCY - 4);

            // ── Draw police ──
            for (const p of police) {
                p.draw(ctx);
            }

            // ── Draw player car ──
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);

            const w = player.width,
                h = player.height;

            // shadow
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 16;

            // car body
            const grad = ctx.createRadialGradient(-2, -2, 2, 0, 0, w);
            grad.addColorStop(0, '#ff6b35');
            grad.addColorStop(0.5, '#e84510');
            grad.addColorStop(1, '#8a2a0a');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, 4);
            ctx.fill();

            ctx.shadowBlur = 0;

            // racing stripes
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(-w / 2 + 3, -h / 2 + 2, 3, h - 4);
            ctx.fillRect(w / 2 - 6, -h / 2 + 2, 3, h - 4);

            // windshield
            ctx.fillStyle = 'rgba(150, 200, 255, 0.4)';
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 3, -h / 2 + 1, w - 6, 3, 1);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(-w / 2 + 3, h / 2 - 4, w - 6, 3, 1);
            ctx.fill();

            // headlights
            ctx.fillStyle = '#ffe066';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffe066';
            ctx.beginPath();
            ctx.arc(w / 2 - 1, -h / 3, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(w / 2 - 1, h / 3, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // taillights
            ctx.fillStyle = '#ff1744';
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ff1744';
            ctx.beginPath();
            ctx.arc(-w / 2 + 2, -h / 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-w / 2 + 2, h / 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // roof light (if escaped)
            if (player.escaped) {
                const flash = Math.sin(frameCount * 0.12) > 0;
                ctx.fillStyle = flash ? '#ff1744' : '#ffd93d';
                ctx.shadowBlur = 12;
                ctx.shadowColor = flash ? '#ff1744' : '#ffd93d';
                ctx.beginPath();
                ctx.arc(0, -h / 2 - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            ctx.restore();

            // ── Speed indicator ──
            const speedPercent = Math.abs(player.speed) / player.maxSpeed;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.roundRect(10, H - 30, 120, 18, 9);
            ctx.fill();
            ctx.fillStyle = speedPercent > 0.7 ? '#4ade80' : speedPercent > 0.3 ? '#ffd93d' : '#ff6b6b';
            ctx.roundRect(12, H - 28, Math.max(4, speedPercent * 116), 14, 7);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText('SPEED', 16, H - 20);

            // ── Game over overlay ──
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = win ? '#4ade80' : '#ff1744';
                ctx.font = 'bold 56px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 20;
                const msg = win ? '🏆 FREEDOM!' : '💀 CAUGHT!';
                ctx.fillText(msg, W / 2, H / 2 - 20);
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = '22px sans-serif';
                ctx.fillText(win ? 'You escaped the city!' : 'The police got you!', W / 2, H / 2 + 50);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '16px sans-serif';
                ctx.fillText(`Time survived: ${Math.floor(gameTime)}s  •  Wanted Level: ${wantedLevel}`, W / 2, H / 2 + 100);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = '14px sans-serif';
                ctx.fillText('Press "New Game" to try again', W / 2, H / 2 + 140);
            }

            // ── Prison indicator ──
            if (player.inPrison && !gameOver) {
                ctx.fillStyle = 'rgba(255,200,50,0.15)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffd93d';
                ctx.font = 'bold 20px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 10;
                ctx.fillText('🔒 ESCAPE THE PRISON!', W / 2, 20);
                ctx.shadowBlur = 0;
                // arrow to gate
                const gateX = 30 * TILE + TILE * 3.5;
                const gateY = (2 + 6 - 1) * TILE;
                const blink = Math.sin(frameCount * 0.06) > 0;
                if (blink) {
                    ctx.fillStyle = 'rgba(255,215,0,0.6)';
                    ctx.font = '28px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⬇', gateX, gateY - 20);
                    ctx.fillStyle = 'rgba(255,215,0,0.3)';
                    ctx.font = '14px sans-serif';
                    ctx.fillText('EXIT', gateX, gateY + 10);
                }
            }
        }

        // ─── Game loop ──────────────────────────────
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // ─── Event listeners ────────────────────────
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
                e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        restartBtn.addEventListener('click', resetGame);

        // ─── Start ──────────────────────────────────
        resetGame();
        loop();

        // ─── Handle resize ──────────────────────────
        function handleResize() {
            const wrapper = document.querySelector('.game-wrapper');
            const maxW = window.innerWidth - 40;
            const maxH = window.innerHeight - 40;
            const wrapperW = Math.min(1060, maxW);
            const wrapperH = Math.min(820, maxH);
            // canvas scales via CSS
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        console.log('🚓 Prison Break started! Drive with WASD / Arrow keys.');
        console.log('🏁 Escape the prison, then reach the EXIT zone!');
    </script>

</body>
</html>
